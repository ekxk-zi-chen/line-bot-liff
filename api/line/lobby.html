<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>特搜戰情大廳</title>
    <meta name="theme-color" content="#1a1a1a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="rescue192.png">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

    <script src="mission_folder/web_push.js"></script>
    <script src="mission_folder/supabase_config.js"></script>

    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: -apple-system, sans-serif; transition: background-color 0.5s ease; }
        .input-dark { width: 100%; background-color: #374151; color: white; padding: 10px 14px; border-radius: 12px; border: 1px solid #4b5563; outline: none; font-size: 14px; }
        .input-dark:focus { border-color: #f59e0b; background-color: #4b5563; }
        
        /* 🎯 救援專區：警戒橘呼吸特效 */
        .rescue-glow {
            background: rgba(251, 146, 60, 0.03); 
            border: 1px solid rgba(249, 115, 22, 0.4); 
            position: relative;
            overflow: hidden;
            animation: rescue-pulse 4s infinite ease-in-out;
        }

        @keyframes rescue-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(249, 115, 22, 0.1); border-color: rgba(249, 115, 22, 0.3); }
            50% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); border-color: rgba(249, 115, 22, 0.8); background: rgba(251, 146, 60, 0.08); }
        }

        .rescue-glow::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.08) 0%, transparent 70%);
            animation: rotate-scan 10s infinite linear; z-index: -1;
        }

        @keyframes rotate-scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .rescue-glow:active { background: rgba(251, 146, 60, 0.2) !important; border-color: #fb923c !important; box-shadow: 0 0 30px rgba(249, 115, 22, 0.5) !important; }

        /* 👥 人員專區專用：指揮中心藍 */
        .personnel-glow{
            position: relative; overflow: hidden;  
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            box-shadow: 0 0 15px rgba(37,99,235,.6), 0 0 30px rgba(14,165,233,.5), inset 0 0 20px rgba(255,255,255,.15);
            transition: all 0.5s ease;
        }

        .personnel-glow::before{
            content:""; position:absolute; inset:0; border-radius:1rem;
            background: radial-gradient(circle at 30% 20%, rgba(255,255,255,.7), transparent 40%);
            opacity:.35; animation: bluePulse 2.5s infinite;
        }

        @keyframes bluePulse{ 0%,100%{opacity:.25} 50%{opacity:.55} }

        /* ==========================================
           🚨 撤離警戒模式 (EVAC ACTIVE)
           ========================================== */
        
        /* 整個大廳背景閃爍紅光 */
        body.evac-mode {
            animation: global-alert-bg 1.5s infinite alternate;
        }
        
        @keyframes global-alert-bg {
            0% { background-color: #1a1a1a; }
            100% { background-color: #2a0808; } /* 深紅色底 */
        }

        /* 大廳容器邊框閃爍 */
        body.evac-mode #lobby-menu {
            border-color: #ef4444 !important; /* tailwind red-500 */
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.4), inset 0 0 20px rgba(239, 68, 68, 0.1) !important;
            animation: container-alert-pulse 1.5s infinite alternate;
        }
        
        @keyframes container-alert-pulse {
            0% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
            100% { box-shadow: 0 0 50px rgba(239, 68, 68, 0.6), inset 0 0 30px rgba(239, 68, 68, 0.2); }
        }

        /* 🚨 核心：人員模組按鈕變成「瘋狂驚嘆號閃爍模式」 */
        body.evac-mode .personnel-glow {
            background: linear-gradient(135deg, #dc2626, #991b1b) !important; /* 血紅色 */
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.8), 0 0 40px rgba(220, 38, 38, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.3) !important;
            animation: btn-danger-pulse 0.6s infinite alternate !important;
        }

        body.evac-mode .personnel-glow::before {
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.8), transparent 60%);
            animation: redAlertPulse 0.6s infinite !important;
        }

        @keyframes btn-danger-pulse {
            0% { transform: scale(1); border-color: #ef4444; }
            100% { transform: scale(1.05); border-color: #f87171; }
        }

        @keyframes redAlertPulse{ 0%,100%{opacity:.4} 50%{opacity:.9} }

        /* 動態替換圖示用的隱藏類別 */
        .hidden-icon { display: none !important; }

    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-4 py-10">

    <div id="login-screen" class="hidden w-full max-w-md bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700">
        <!-- 登入區塊保持不變... -->
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">🏛️</div>
            <h1 class="text-xl font-bold text-white tracking-wider">特搜戰情總部大廳</h1>
            <p class="text-xs text-gray-400 mt-1">請先驗證您的身分</p>
        </div>

        <div class="flex mb-6 bg-gray-900 p-1 rounded-lg border border-gray-700 text-center">
            <button onclick="switchAuthTab('login')" id="tab-login" class="flex-1 py-2 rounded-md text-sm font-bold transition-all bg-indigo-600 text-white">登入</button>
            <button onclick="switchAuthTab('bind')" id="tab-bind" class="flex-1 py-2 rounded-md text-sm font-bold transition-all text-gray-400">信箱綁定</button>
            <button onclick="switchAuthTab('signup')" id="tab-signup" class="flex-1 py-2 rounded-md text-sm font-bold transition-all text-gray-400">註冊申請</button>
        </div>

        <div id="form-login" class="space-y-4">
            <input type="email" id="login-email" placeholder="電子信箱" class="input-dark py-3">
            <input type="password" id="login-password" placeholder="密碼" class="input-dark py-3">
            <button onclick="handleLogin()" id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg mt-2 transition-transform active:scale-95">進入大廳</button>
        </div>

        <div id="form-bind" class="hidden space-y-4">
            <div class="text-xs text-yellow-400 bg-yellow-900/30 p-2 rounded border border-yellow-700 mb-2">
                💡 老隊員請輸入您在系統登記的信箱，並設定密碼以完成綁定。
            </div>
            <input type="email" id="bind-email" placeholder="輸入已登記的電子信箱" class="input-dark py-3">
            <div class="grid grid-cols-2 gap-2">
                <input type="password" id="bind-password" placeholder="設定密碼 (至少6碼)" class="input-dark py-3 text-sm">
                <input type="password" id="bind-confirm" placeholder="確認密碼" class="input-dark py-3 text-sm">
            </div>
            <button onclick="handleBind()" id="bind-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-2 transition-transform active:scale-95">確認綁定</button>
        </div>

        <div id="form-signup" class="hidden space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <input type="email" id="reg-email" placeholder="電子信箱" class="input-dark text-sm">
                <input type="text" id="reg-name" placeholder="真實姓名 (如: 陳大明)" class="input-dark text-sm">
            </div>
            <div class="mb-2">
                <input type="text" id="reg-display-name" placeholder="顯示名稱/綽號 (如: 山豬)" class="input-dark text-sm">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="password" id="reg-password" placeholder="設定密碼" class="input-dark text-sm">
                <input type="password" id="reg-confirm" placeholder="確認密碼" class="input-dark text-sm">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <select id="reg-unit" onchange="toggleOtherUnit()" class="input-dark text-sm bg-gray-700"><option value="">載入中...</option></select>
                <input type="text" id="reg-title" placeholder="職稱 (如隊員)" class="input-dark text-sm">
            </div>
            <input type="text" id="reg-unit-other" placeholder="👉 請輸入單位名稱" class="input-dark hidden text-sm border-indigo-500">
            <input type="tel" id="reg-phone" placeholder="連絡電話" class="input-dark text-sm">
            <textarea id="reg-note" placeholder="申請備註" class="input-dark text-sm h-16 py-2"></textarea>
            <button onclick="handleRealSignUp()" id="signup-btn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg mt-2 transition-transform active:scale-95">提交註冊</button>
        </div>
    </div>

    <!-- 🚨 戰情大廳選單 -->
    <div id="lobby-menu" class="hidden w-full max-w-md bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700 text-center transition-all duration-500">
        <!-- 頂部標題動態變化 -->
        <h2 id="lobby-title" class="text-2xl font-bold text-white mb-2 transition-colors duration-300">特搜戰情大廳</h2>
        <p id="lobby-subtitle" class="text-gray-400 text-sm mb-6 transition-colors duration-300">歡迎登入，請選擇您要前往的系統</p>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="window.location.href='app_mission.html'" class="bg-gray-700 hover:bg-gray-600 border border-gray-600 p-6 rounded-xl flex flex-col items-center justify-center gap-3 transition-all active:scale-95 shadow-lg">
                <span class="text-4xl">🎒</span>
                <span class="text-white font-bold">裝備管理</span>
            </button>
            
            <button onclick="window.location.href='rescue/app_rescue.html'" 
                class="glass-card rescue-glow p-6 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all active:scale-95 shadow-xl">
                <div class="relative">
                    <span class="text-4xl">🎯</span>
                </div>
                <span class="text-white font-bold tracking-widest">救援專區</span>
            </button>

            <!-- 🚨 人員專區 (預設藍色，撤離時變紅色驚嘆號) -->
            <button onclick="window.location.href='personnel_control/app_personnel.html'"
                id="personnel-btn"
                class="glass-card personnel-glow p-6 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all active:scale-95 shadow-xl">
                
                <div class="relative">
                    <!-- 平常顯示群組圖標 -->
                    <span id="icon-normal" class="text-4xl drop-shadow-lg transition-all duration-300">👥</span>
                    <!-- 撤離時顯示驚嘆號 -->
                    <span id="icon-alert" class="text-4xl drop-shadow-lg hidden-icon text-white" style="text-shadow: 0 0 20px #fff;">⚠️</span>
                </div>

                <span id="text-personnel" class="text-white font-bold tracking-widest transition-all duration-300">人員管制</span>
            </button>

            <button onclick="window.location.href='app_task.html'" class="bg-orange-900/40 hover:bg-orange-800/60 border border-orange-700 p-6 rounded-xl flex flex-col items-center justify-center gap-3 transition-all active:scale-95 shadow-lg">
                <span class="text-4xl">📡</span>
                <span class="text-white font-bold">任務戰情</span>
            </button>

            <button onclick="window.location.href='official_section/app_docs.html'" class="bg-indigo-900/40 hover:bg-indigo-800/60 border border-indigo-700 p-6 rounded-xl flex flex-col items-center justify-center gap-3 transition-all active:scale-95 shadow-[0_0_15px_rgba(79,70,229,0.3)]">
                <span class="text-4xl">📁</span>
                <span class="text-white font-bold">公文專區</span>
            </button>

            <button onclick="alert('建置中...')" class="bg-gray-700/50 border border-gray-600/50 p-6 rounded-xl flex flex-col items-center justify-center gap-3 transition-all cursor-not-allowed">
                <span class="text-4xl opacity-50">🏗️</span>
                <span class="text-gray-400 font-bold">某種新巧思</span>
            </button>
        </div>

        <button onclick="handleLogout()" class="text-red-400 text-sm font-bold py-2 px-4 border border-red-900 rounded-lg hover:bg-red-900/50 transition-colors">登出系統</button>
    </div>

    <script>
        // 登入邏輯與其他函數保持不變...
        function switchAuthTab(type) {
            const tabs = ['login', 'bind', 'signup'];
            tabs.forEach(t => {
                const isCurrent = (t === type);
                const btn = document.getElementById(`tab-${t}`);
                if (isCurrent) {
                    btn.className = `flex-1 py-2 rounded-md text-sm font-bold transition-all text-white ${t === 'login' ? 'bg-indigo-600' : t === 'bind' ? 'bg-blue-600' : 'bg-green-600'}`;
                } else {
                    btn.className = "flex-1 py-2 rounded-md text-sm font-bold transition-all text-gray-400";
                }
                document.getElementById(`form-${t}`).classList.toggle('hidden', !isCurrent);
            });
        }

        function toggleOtherUnit() {
            const unitVal = document.getElementById('reg-unit').value;
            const otherInput = document.getElementById('reg-unit-other');
            if (unitVal === '其他' || unitVal === 'OTHER') {
                otherInput.classList.remove('hidden');
                otherInput.focus();
            } else {
                otherInput.classList.add('hidden');
            }
        }

        async function loadDynamicUnits() {
            const { data, error } = await _supabase.rpc('get_existing_units');
            const unitSelect = document.getElementById('reg-unit');
            if (data && data.length > 0) {
                let html = '<option value="">選擇單位</option>';
                data.forEach(item => { html += `<option value="${item.unit_name}">${item.unit_name}</option>`; });
                html += '<option value="OTHER">--- 其他 (手動輸入) ---</option>';
                unitSelect.innerHTML = html;
            }
        }

        async function processLoginSuccess(user) {
            window.userEmail = user.email;
            if (typeof requestWebPushPermission === 'function') {
                await requestWebPushPermission();
            }

            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect');

            if (redirectUrl) {
                window.location.href = decodeURIComponent(redirectUrl);
            } else {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('lobby-menu').classList.remove('hidden');
                
                // 登入成功後，立刻檢查一次全域廣播狀態
                checkGlobalEvacStatus();
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            if (!email || !password) return alert("請輸入帳號密碼！");
            
            btn.innerText = "驗證中..."; btn.disabled = true;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert("登入失敗：" + error.message);
                btn.innerText = "進入大廳"; btn.disabled = false;
                return;
            }
            processLoginSuccess(data.user);
        }

        async function handleBind() {
            const email = document.getElementById('bind-email').value.trim();
            const pw = document.getElementById('bind-password').value;
            const pwConfirm = document.getElementById('bind-confirm').value; 
            const btn = document.getElementById('bind-btn');

            if (!email || !pw) return alert("請輸入信箱與密碼！");
            if (pw !== pwConfirm) return alert("⚠️ 兩次密碼輸入不一致！");
            if (pw.length < 6) return alert("密碼至少 6 碼！");

            btn.innerText = "驗證中..."; btn.disabled = true;
            try {
                const { data: userName } = await _supabase.rpc('get_user_name_by_email', { p_email: email });
                if (!userName) return alert("❌ 找不到此信箱！如果您是新進人員，請切換至註冊申請。");

                const { data: authData, error: authErr } = await _supabase.auth.signUp({ 
                    email, 
                    password: pw,
                    options: { data: { display_name: userName } }
                });
                if (authErr) throw authErr;

                alert(`🎉 綁定成功！歡迎回來，${userName}！`);
                processLoginSuccess(authData.user);
            } catch (err) {
                alert("綁定失敗：" + err.message);
            } finally {
                btn.innerText = "確認綁定"; btn.disabled = false;
            }
        }

        async function handleRealSignUp() {
            const email = document.getElementById('reg-email').value.trim();
            const pw = document.getElementById('reg-password').value;
            const pwConfirm = document.getElementById('reg-confirm').value;
            const name = document.getElementById('reg-name').value.trim();
            const displayName = document.getElementById('reg-display-name').value.trim();
            let unit = document.getElementById('reg-unit').value;
            
            if (!email || !name || !displayName || !pw || !unit) return alert("請填寫必填欄位");
            const title = document.getElementById('reg-title').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const note = document.getElementById('reg-note').value.trim();
            const btn = document.getElementById('signup-btn');

            if (pw !== pwConfirm) return alert("兩次密碼輸入不一致");
            if (pw.length < 6) return alert("密碼至少 6 碼");

            btn.innerText = "提交中..."; btn.disabled = true;
            try {
                const { data: userName } = await _supabase.rpc('get_user_name_by_email', { p_email: email });
                if (userName) return alert(`⚠️ 信箱已存在！請至「信箱綁定」設定密碼。`);

                const { data: authData, error: authErr } = await _supabase.auth.signUp({ 
                    email, 
                    password: pw,
                    options: { data: { display_name: displayName } }
                });
                if (authErr) throw authErr;

                const fakeUserId = "APP_" + Math.random().toString(36).substr(2, 9);
                const { data: regRes, error: regErr } = await _supabase.rpc('handle_new_user_registration', {
                    p_name: name, p_display_name: displayName, p_unit: unit, 
                    p_email: email, p_user_id: fakeUserId, p_phone: phone, 
                    p_title: title, p_note: note
                });

                if (regErr) throw regErr;
                if (!regRes.success) throw new Error(regRes.message);

                alert("🎉 註冊成功！資料已提交。");
                processLoginSuccess(authData.user);
            } catch (err) {
                alert("錯誤：" + err.message);
            } finally {
                btn.innerText = "提交註冊"; btn.disabled = false;
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        async function checkSessionOnLoad() {
            await loadDynamicUnits();
            const { data, error } = await _supabase.auth.getSession();
            if (data.session) {
                processLoginSuccess(data.session.user);
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        }

        window.addEventListener('load', checkSessionOnLoad);

        // ==========================================
        // 🚨 大廳全域廣播雷達 (智慧校準版)
        // ==========================================

        let evacRadarInterval = null;

        // 1. 雷達掃描函數
        async function checkGlobalEvacStatus() {
            try {
                // 去資料庫看現在是不是撤離中
                const { data, error } = await _supabase.from('system_settings').select('is_evac_active').eq('id', 1).single();
                if (error) throw error;
                
                if (data) {
                    console.log("📡 雷達回報狀態：", data.is_evac_active ? "🔴 警戒" : "🟢 正常");
                    toggleLobbyEvacMode(data.is_evac_active);
                }
            } catch (e) {
                console.error("📡 雷達掃描失敗：", e.message);
            }
        }

        // 2. 啟動雷達 (確保登入後才呼叫)
        function startEvacRadar() {
            if (!evacRadarInterval) {
                console.log("📡 戰情雷達啟動中...");
                checkGlobalEvacStatus(); // 立刻掃描一次
                evacRadarInterval = setInterval(checkGlobalEvacStatus, 10000); // 之後每 10 秒一次
            }
        }

        // 3. 停止雷達
        function stopEvacRadar() {
            if (evacRadarInterval) {
                console.log("📡 戰情雷達關閉。");
                clearInterval(evacRadarInterval);
                evacRadarInterval = null;
            }
        }

        // ==========================================
        // 🚨 執行大廳變身特效 (動作執行官)
        // ==========================================
        function toggleLobbyEvacMode(isActive) {
            const body = document.body;
            const title = document.getElementById('lobby-title');
            const subtitle = document.getElementById('lobby-subtitle');
            
            const iconNormal = document.getElementById('icon-normal');
            const iconAlert = document.getElementById('icon-alert');
            const textPersonnel = document.getElementById('text-personnel');
            const personnelBtn = document.getElementById('personnel-btn');

            if (isActive) {
                // 🔴 進入：紅色警戒模式
                body.classList.add('evac-mode');
                if (title) {
                    title.innerHTML = '⚠️ 緊急撤離啟動 ⚠️';
                    title.style.color = '#ef4444'; // 紅色
                }
                if (subtitle) {
                    subtitle.innerHTML = '請盡速進入人員管制系統回報平安！';
                    subtitle.style.color = '#fca5a5'; 
                }
                
                // 替換「人員管制」按鈕的圖標與文字
                if (iconNormal) iconNormal.classList.add('hidden-icon');
                if (iconAlert) iconAlert.classList.remove('hidden-icon');
                if (textPersonnel) textPersonnel.innerHTML = '立即回報安全';
                
            } else {
                // 🟢 恢復：平時狀態
                body.classList.remove('evac-mode');
                if (title) {
                    title.innerHTML = '特搜戰情大廳';
                    title.style.color = 'white';
                }
                if (subtitle) {
                    subtitle.innerHTML = '歡迎登入，請選擇您要前往的系統';
                    subtitle.style.color = '#9ca3af'; // 灰色
                }
                
                // 恢復原本圖標與文字
                if (iconAlert) iconAlert.classList.add('hidden-icon');
                if (iconNormal) iconNormal.classList.remove('hidden-icon');
                if (textPersonnel) textPersonnel.innerHTML = '人員管制';
            }
        }
        // 4. 偵測分頁可見度 (切換分頁或關螢幕時停用)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) stopEvacRadar();
            else if (window.isLoggedIn) startEvacRadar(); // 只有登入狀態下才重啟
        });

        // 🎯 修改原本的 processLoginSuccess，讓它在成功後才啟動雷達
        async function processLoginSuccess(user) {
            window.userEmail = user.email;
            window.isLoggedIn = true; // 標記已登入

            if (typeof requestWebPushPermission === 'function') {
                await requestWebPushPermission();
            }

            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect');

            if (redirectUrl) {
                window.location.href = decodeURIComponent(redirectUrl);
            } else {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('lobby-menu').classList.remove('hidden');
                
                // 🚀 關鍵：在顯示大廳選單的同時，才啟動雷達！
                startEvacRadar(); 
            }
        }

    </script>
</body>
</html>
