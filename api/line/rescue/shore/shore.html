<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>支撐相關</title>
  
  <!-- 引入 Tailwind CSS (快速排版必備) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 🔒 認證三連 1 & 2：引入 Supabase 裝甲與設定檔 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../mission_folder/supabase_config.js"></script>

  <style>
    /* 🚨 繼承特搜大隊統一風格 */
    html, body { overscroll-behavior-x: none; touch-action: pan-y; }
    html { background-color: #030712; min-height: 100vh; }
    body { 
        background-color: transparent; color: #e2e8f0; 
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
        letter-spacing: 0.5px; position: relative; overflow-x: hidden; min-height: 100vh; margin: 0;
    }

    /* 背景流體與火花 (科技藍) */
    body::before {
        content: ""; position: fixed; bottom: -100px; left: -50%; width: 200%; height: 300px;
        background: radial-gradient(ellipse at center, rgba(14, 165, 233, 0.2) 0%, transparent 70%); 
        border-radius: 40% 45% 42% 38%; animation: water-flow 12s infinite linear; z-index: -1;
    }
    @keyframes water-flow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    body::after {
        content: ""; position: fixed; inset: 0;
        background-image: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.15) 1px, transparent 1px);
        background-size: 40px 40px; animation: spark-drift 20s infinite linear; z-index: -2;
    }
    @keyframes spark-drift { 0% { background-position: 0 0; } 100% { background-position: 40px 100vh; } }

    /* 效能優化：強制開啟背景 GPU 加速 */
    body::before, body::after {
        transform: translateZ(0);
        will-change: transform, background-position;
    }

    /* 玻璃態容器 */
    .glass { 
        background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); 
        border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.6); position: relative; z-index: 10;
    }

    /* 施工藍圖輸入框 */
    .input-neon { 
        background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; color: #fff; 
        font-family: inherit; outline: none; transition: 0.3s; font-size: 15px !important;
        padding: 8px 12px !important; line-height: 1.5; border-radius: 8px; width: 100%;
    }
    .input-neon:focus { 
        border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
    }
    
    select.input-neon:focus {
        animation: none !important; 
        border-color: #38bdf8;
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
    }

    /* 超頻按鈕 (科技藍系) */
    .btn-glow { 
        position: relative; background: linear-gradient(90deg, #0284c7, #38bdf8, #818cf8, #0284c7);
        background-size: 300% 100%; color: white; padding: 12px 20px; border-radius: 8px; font-weight: bold; 
        letter-spacing: 2px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.4); transition: all 0.3s; animation: flow-shimmer 3s linear infinite;
        cursor: pointer;
    }
    .btn-glow:active { transform: scale(0.95); }
    .btn-glow:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; animation: none; box-shadow: none; border-color: #475569;}
    @keyframes flow-shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    /* 戰術導航分頁 (取代原本的 Sidebar) */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: rgba(15, 23, 42, 0.8); padding: 4px; border-radius: 12px; border: 1px solid #334155;}
    .tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; cursor: pointer; color: #94a3b8; font-weight: bold; transition: 0.3s; }
    .tab.active { background: rgba(56, 189, 248, 0.2); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.5); box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }

    /* 系統警告面板 (給名言用的) */
    .alert-panel {
        background: rgba(220, 38, 38, 0.1); border-left: 4px solid #ef4444; border-radius: 0 8px 8px 0; padding: 12px;
        box-shadow: 0 4px 15px rgba(220, 38, 38, 0.2); margin-bottom: 20px;
    }

    /* 以下保留給 3D 繪圖與裝備清單的必要 CSS */
    .result { margin-top: 20px; padding: 15px; background: rgba(15, 23, 42, 0.8); border-radius: 8px; border: 1px solid #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
    .result-section { margin-bottom: 16px; }
    .result-section h3 { border-bottom: 1px solid #38bdf8; padding-bottom: 4px; margin-bottom: 10px; color: #7dd3fc; }
    .result-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #475569; }
    .result-label { flex: 1; color: #cbd5e1; }
    .result-value { flex: 0 0 auto; font-weight: bold; color: #facc15; } /* 金黃色凸顯數值 */

    .group-container { margin-bottom: 20px; border-left: 4px solid #38bdf8; padding: 10px 15px; border-radius: 8px; background: rgba(30, 41, 59, 0.6); }
    .item-summary { display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.9); padding: 10px; border-radius: 6px; margin-bottom: 5px; border: 1px solid #475569; }
    .item-details { display: none; margin-top: 10px; padding: 10px; background: rgba(15, 23, 42, 0.9); border-radius: 6px; border: 1px solid #475569; }
    .item-detail-content { display: flex; flex-direction: row; gap: 10px; }
    .item-text { flex: 1; color: #cbd5e1; }
    .item-img { flex: 0 0 120px; }
    .item-img img { max-width: 100%; border-radius: 4px; border: 1px solid #475569; }

    @media (max-width: 768px) {
      .item-detail-content { flex-direction: column; }
      .item-img { flex: unset; }
    }
    /* ⛶ 3D 全螢幕力場 (終極防護版) */
    .fullscreen-mode {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 9999 !important;
        margin: 0 !important;
        padding: 0 !important;
        border-radius: 0 !important;
        background: #030712 !important; /* 特搜黑 */
    }
  </style>
</head>

<body class="p-4 pb-12">
  <div class="max-w-md mx-auto">
      
      <!-- 🌟 頂部標題與返回按鈕 -->
      <header class="mb-6 relative flex items-center justify-center">
          <button onclick="window.location.href='../app_rescue.html'" class="absolute left-0 text-cyan-400 font-bold z-50">◀ 返回</button>
          <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">支撐工程模組</h1>
      </header>

      <!-- 🌟 戰術導航分頁 (取代 Sidebar) -->
      <div class="tabs">
          <div id="tab-calc" class="tab active" onclick="switchTab('calc')">數據計算</div>
          <div id="tab-composite" class="tab" onclick="switchTab('composite')">背景合成</div>
      </div>

      <!-- 🌟 主要內容區塊 -->
      <div id="main-content" class="glass p-5">
          <!-- 預設顯示：系統提示與名言 -->
          <div class="alert-panel mb-6">
              <h2 class="text-red-400 font-bold mb-2">⚠️ 花搜搜二名言</h2>
              <p class="text-white text-lg font-black tracking-widest mb-2">「成也支撐，敗也支撐」</p>
              <div class="text-xs text-slate-300 space-y-1">
                  <p>▶ 支撐種類包含：箱型支撐、牆面支撐、斜樓板支撐</p>
                  <p>▶ 可根據現場測量資料自動計算所需支撐長度與材料</p>
                  <p>▶ 計算結果分為「臨時支撐」與「完整支撐」</p>
              </div>
              <p class="text-red-400 font-bold text-xs mt-3 bg-red-900/30 p-2 rounded inline-block">小朋友才計較得很精細</p>
          </div>
          
          <p class="text-center text-slate-400 text-sm animate-pulse">▶ 請點選上方標籤開始操作</p>
      </div>

  </div>

  <!-- 原本的 3D 套件載入保留 -->
  <!-- ...existing code... -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/controls/OrbitControls.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- ...existing code... -->
  <script src="shore_data.js"></script>
  <script src="shore_data2.js"></script>


  <script>

    // 添加在 script 開頭，現有變量後面
    let currentCalculationData = null;
    let currentCalculationType = null;
    // 全局变量用于存储合成相关的状态
    let compositeScene = null;
    let compositeCamera = null;
    let compositeRenderer = null;
    let currentModel = null;
    let backgroundImageElement = null;

    // 🚀 戰術導航分頁切換邏輯
    function switchTab(tabId) {
      // 1. 切換標籤的發光狀態
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');

      // 2. 根據點擊的標籤，呼叫對應的畫面生成函數
      if (tabId === 'calc') {
        if (typeof showCalculationForm === 'function') {
            showCalculationForm(); // 呼叫您原本的計算畫面
        } else {
            document.getElementById('main-content').innerHTML = '<p class="text-cyan-400 text-center mt-10">請選擇左方或上方選單進行操作。</p>';
        }
      } else if (tabId === 'composite') {
        showBackgroundComposite(); // 呼叫背景合成畫面
      }
    }

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
    }




    ////////////////////////////////////////////









    // 添加全局变量来跟踪实际渲染尺寸
    let actualRenderSize = { width: 0, height: 0 };
    // 在 script 开头添加全局变量来保存相机状态
    let cameraState = {
      position: new THREE.Vector3(),
      target: new THREE.Vector3(),
      fov: 60
    };

    function initCompositeViewer() {
      const container = document.getElementById('compositeViewer');
      if (!container) return;

      if (compositeRenderer) {
        compositeRenderer.dispose();
      }

      compositeScene = new THREE.Scene();
      compositeScene.background = null;

      const rect = container.getBoundingClientRect();
      const containerWidth = Math.floor(rect.width);
      const containerHeight = Math.floor(rect.height);

      console.log('初始化尺寸:', containerWidth, 'x', containerHeight);

      compositeCamera = new THREE.PerspectiveCamera(
        60,
        containerWidth / containerHeight,
        0.01,
        10000
      );

      compositeCamera.position.set(6, 6, 6);

      compositeRenderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        preserveDrawingBuffer: true
      });

      compositeRenderer.setSize(containerWidth, containerHeight);
      compositeRenderer.setClearColor(0x000000, 0);

      container.innerHTML = '';
      container.appendChild(compositeRenderer.domElement);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      compositeScene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(10, 20, 15);
      compositeScene.add(directionalLight);

      const controls = new THREE.OrbitControls(compositeCamera, compositeRenderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.1;

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        compositeRenderer.render(compositeScene, compositeCamera);
      }
      animate();

      // 🔥 簡化版 resize - 只更新尺寸,不碰相機位置!
      let resizeTimeout;
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(function () {
          const container = document.getElementById('compositeViewer');
          if (!container || !compositeRenderer || !compositeCamera) return;

          const newRect = container.getBoundingClientRect();
          const newWidth = Math.floor(newRect.width);
          const newHeight = Math.floor(newRect.height);

          console.log('🔄 強制視窗調整:', newWidth, 'x', newHeight);

          // 🔥 強制更新
          compositeRenderer.setSize(newWidth, newHeight);
          compositeCamera.aspect = newWidth / newHeight;
          compositeCamera.updateProjectionMatrix();

          // 確保重新渲染
          compositeRenderer.render(compositeScene, compositeCamera);
        }, 100); // 縮短延遲時間
      });

      backgroundImageElement = document.getElementById('backgroundImage');
    }
    // 改進的模型加載函數，確保適當的縮放
    function loadModelForComposite() {
      if (!compositeScene) return;

      // 清除现有模型
      if (currentModel) {
        compositeScene.remove(currentModel);
        currentModel = null;
      }

      const modelType = document.getElementById('modelType').value;

      if (!modelType) {
        alert('请先选择模型类型！');
        return;
      }

      // 如果没有计算数据，尝试从表单获取
      if (!currentCalculationData) {
        if (!tryGetCurrentFormData(modelType)) {
          alert('請先進行支撐計算或填寫表單數據！');
          return;
        }
      }

      // 根据类型调用对应的创建函数
      let modelGroup;
      switch (modelType) {
        case 'box':
          modelGroup = createBoxScene(currentCalculationData);
          break;
        case 'wall':
          modelGroup = createWallScene(currentCalculationData);
          break;
        case 'floor':
          modelGroup = createFloorScene(currentCalculationData);
          break;
      }

      if (modelGroup) {
        currentModel = modelGroup;
        compositeScene.add(currentModel);

        // 關鍵：設置適當的初始縮放
        const box = new THREE.Box3().setFromObject(currentModel);
        const size = box.getSize(new THREE.Vector3());
        const maxSize = Math.max(size.x, size.y, size.z);

        // 根據模型大小自動調整縮放
        let initialScale = 1.0;
        if (maxSize > 10) {
          initialScale = 8.0 / maxSize;
        } else if (maxSize < 1) {
          initialScale = 1.5 / maxSize;
        }

        currentModel.scale.set(initialScale, initialScale, initialScale);

        // 更新縮放滑塊
        document.getElementById('scaleSlider').value = initialScale;
        document.getElementById('scaleValue').textContent = Math.round(initialScale * 100) + '%';

        // 居中模型
        setTimeout(() => {
          centerModel();
        }, 100);
      }
    }
    function checkRendererState() {
      const container = document.getElementById('compositeViewer');
      const rect = container.getBoundingClientRect();
      console.log('=== 渲染器狀態檢查 ===');
      console.log('容器實際尺寸:', rect.width, 'x', rect.height);
      console.log('渲染器畫布尺寸:', compositeRenderer.domElement.width, 'x', compositeRenderer.domElement.height);
      console.log('相機比例:', compositeCamera.aspect);
      console.log('視窗大小:', window.innerWidth, 'x', window.innerHeight);
      console.log('設備像素比:', window.devicePixelRatio);
    }
    // 新增：從表單獲取當前數據
    function tryGetCurrentFormData(type) {
      const lengthInput = document.getElementById('length');
      if (!lengthInput || !lengthInput.value) return false;

      const formData = {
        "測量長度": parseFloat(lengthInput.value)
      };

      // 根據類型獲取其他參數
      const inputs = {
        'box': ['top', 'bottom', 'wedge', 'spacing', 'connector'],
        'wall': ['top', 'bottom', 'wedge', 'spacing', 'connector', 'stopper', 'angle'],
        'floor': ['top', 'bottom', 'spacing', 'connector', 'stopper', 'angle']
      };

      inputs[type].forEach(key => {
        const input = document.getElementById(key);
        if (input && input.value) {
          formData[key === 'top' ? '頂板厚度' :
            key === 'bottom' ? '底板厚度' :
              key === 'wedge' ? '楔型木厚度' :
                key === 'spacing' ? '支撐柱間距' :
                  key === 'connector' ? '連接柱寬度' :
                    key === 'stopper' ? '止檔寬度' :
                      key === 'angle' ? '角度' : key] = parseFloat(input.value);
        }
      });

      currentCalculationData = formData;
      currentCalculationType = type;
      return true;
    }

    // 新增：從現有計算創建模型
    function createModelFromCalculation(type) {
      if (!currentCalculationData) return;

      currentModel = new THREE.Group();
      compositeScene.add(currentModel);

      let modelGroup;
      switch (type) {
        case 'box':
          modelGroup = createBoxScene(currentCalculationData);
          break;
        case 'wall':
          modelGroup = createWallScene(currentCalculationData);
          break;
        case 'floor':
          modelGroup = createFloorScene(currentCalculationData);
          break;
        default:
          return;
      }

      // 將創建的模型添加到當前模型
      currentModel.add(modelGroup);

      // 設置合適的初始縮放
      currentModel.scale.set(0.8, 0.8, 0.8);
    }
    // 為合成創建箱型支撐模型
    function createBoxModelForComposite() {
      if (!currentCalculationData || currentCalculationType !== "box") {
        alert('請先進行相形支撐計算！');
        return;
      }

      // 清除现有模型
      if (currentModel) {
        compositeScene.remove(currentModel);
      }

      currentModel = createBoxScene(currentCalculationData);
      compositeScene.add(currentModel);
      centerModel();
    }

    // 為合成創建牆面支撐模型
    function createWallModelForComposite() {
      if (!currentCalculationData || currentCalculationType !== "wall") {
        alert('請先進行牆面支撐計算！');
        return;
      }

      // 清除现有模型
      if (currentModel) {
        compositeScene.remove(currentModel);
      }

      currentModel = createWallScene(currentCalculationData);
      compositeScene.add(currentModel);
      centerModel();
    }
    // 為合成創建斜樓板支撐模型
    function createFloorModelForComposite() {
      if (!currentCalculationData || currentCalculationType !== "floor") {
        alert('請先進行斜樓板支撐計算！');
        return;
      }

      // 清除现有模型
      if (currentModel) {
        compositeScene.remove(currentModel);
      }

      currentModel = createFloorScene(currentCalculationData);
      compositeScene.add(currentModel);
      centerModel();
    }
    // 上传背景图片
    document.addEventListener('DOMContentLoaded', function () {
      // 文件上传处理
      document.addEventListener('change', function (e) {
        if (e.target.id === 'backgroundUpload') {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = function (event) {
              backgroundImageElement.src = event.target.result;
              backgroundImageElement.style.display = 'block';
            };
            reader.readAsDataURL(file);
          }
        }
      });
    });

    // 拍照功能（移动设备）
    function capturePhoto() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('您的瀏覽器不支援拍照功能,請使用「上傳背景圖片」。');
        return;
      }

      // 創建拍照界面
      const cameraModal = document.createElement('div');
      cameraModal.style.cssText = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 10000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  `;

      const video = document.createElement('video');
      video.style.cssText = `
    max-width: 90%;
    max-height: 70%;
    background: #000;
  `;
      video.setAttribute('playsinline', ''); // iOS 需要
      video.setAttribute('autoplay', '');

      const buttonContainer = document.createElement('div');
      buttonContainer.style.cssText = `
    margin-top: 20px;
    display: flex;
    gap: 10px;
  `;

      const captureBtn = document.createElement('button');
      captureBtn.textContent = '📷 拍照';
      captureBtn.style.cssText = `
    padding: 15px 30px;
    font-size: 18px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  `;

      const cancelBtn = document.createElement('button');
      cancelBtn.textContent = '❌ 取消';
      cancelBtn.style.cssText = `
    padding: 15px 30px;
    font-size: 18px;
    background: #f44336;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  `;

      buttonContainer.appendChild(captureBtn);
      buttonContainer.appendChild(cancelBtn);
      cameraModal.appendChild(video);
      cameraModal.appendChild(buttonContainer);
      document.body.appendChild(cameraModal);

      // 啟動相機
      navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'environment', // 使用後置鏡頭
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      })
        .then(function (stream) {
          video.srcObject = stream;
          video.play();

          // 拍照按鈕
          captureBtn.onclick = function () {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            // 設定為背景圖片
            backgroundImageElement.src = canvas.toDataURL('image/jpeg', 0.9);
            backgroundImageElement.style.display = 'block';

            // 停止相機並關閉
            stream.getTracks().forEach(track => track.stop());
            document.body.removeChild(cameraModal);

            alert('✅ 照片已設定為背景!');
          };

          // 取消按鈕
          cancelBtn.onclick = function () {
            stream.getTracks().forEach(track => track.stop());
            document.body.removeChild(cameraModal);
          };
        })
        .catch(function (error) {
          console.error('無法訪問相機:', error);
          document.body.removeChild(cameraModal);

    // 修复模型居中函数
    function centerModel() {
      if (currentModel && compositeCamera) {
        // 重置位置和旋转
        currentModel.position.set(0, 0, 0);
        currentModel.rotation.set(0, 0, 0);

        // 计算边界框并居中
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        // 将模型中心移动到原点
        currentModel.position.sub(center);

        // 调整相机视图
        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = compositeCamera.fov * (Math.PI / 180);

        // 计算确保模型完全可见的距离
        let cameraZ = Math.abs(maxDim / Math.sin(fov / 2));
        cameraZ = cameraZ * 1.5; // 增加额外边距

        if (window.innerWidth <= 768) {
          compositeCamera.position.set(0, 0, cameraZ * 1.2);
        } else {
          compositeCamera.position.set(0, 0, cameraZ);
        }

        compositeCamera.lookAt(0, 0, 0);
        compositeCamera.updateProjectionMatrix();

        // 重置控制器目标
        const controls = compositeRenderer.domElement._controls;
        if (controls) {
          controls.target.set(0, 0, 0);
          controls.update();
        }

        // 保存相机状态
        if (typeof saveCameraState === 'function') {
          saveCameraState();
        }
      }
    }

    // ==========================================
    // 🚀 終極高畫質合成引擎 (解決手機跑位與模糊問題)
    // ==========================================
    async function generateCompositeCanvas() {
        const container = document.getElementById('compositeViewer');
        const bgImg = document.getElementById('backgroundImage');
        
        // 抓取「當下」精確的 CSS 尺寸
        const currentWidth = container.clientWidth;
        const currentHeight = container.clientHeight;
        
        // 🚀 黑科技：讀取手機的 Retina 像素密度 (通常是 2 或 3，電腦是 1)
        const dpr = window.devicePixelRatio || 1;
        const exportWidth = currentWidth * dpr;
        const exportHeight = currentHeight * dpr;

        // 1. 強制同步 3D 渲染器尺寸、比例與高畫素
        compositeRenderer.setSize(currentWidth, currentHeight);
        compositeRenderer.setPixelRatio(dpr); // 🚀 關鍵：讓 3D 渲染也變成高畫質
        compositeCamera.aspect = currentWidth / currentHeight;
        compositeCamera.updateProjectionMatrix();
        compositeRenderer.render(compositeScene, compositeCamera);

        // 2. 建立高畫質 Canvas
        const canvas = document.createElement('canvas');
        canvas.width = exportWidth;
        canvas.height = exportHeight;
        const ctx = canvas.getContext('2d');

        // 填滿白底
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, exportWidth, exportHeight);

        // 3. 繪製背景圖 (精確放大對齊 object-fit: contain)
        if (bgImg && bgImg.style.display !== 'none' && bgImg.naturalWidth > 0) {
            const containerRatio = exportWidth / exportHeight;
            const imgRatio = bgImg.naturalWidth / bgImg.naturalHeight;

            let drawWidth, drawHeight, offsetX, offsetY;

            if (imgRatio > containerRatio) {
                drawWidth = exportWidth;
                drawHeight = exportWidth / imgRatio;
                offsetX = 0;
                offsetY = (exportHeight - drawHeight) / 2;
            } else {
                drawHeight = exportHeight;
                drawWidth = exportHeight * imgRatio;
                offsetX = (exportWidth - drawWidth) / 2;
                offsetY = 0;
            }

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(bgImg, offsetX, offsetY, drawWidth, drawHeight);
        }

        // 4. 疊加 3D 渲染結果 (此時的 domElement 已經是高畫質尺寸)
        ctx.drawImage(compositeRenderer.domElement, 0, 0, exportWidth, exportHeight);

        // 5. 輸出完畢，把預覽畫質降回一般，避免手機發燙卡頓
        compositeRenderer.setPixelRatio(1);
        compositeRenderer.setSize(currentWidth, currentHeight);
        
        return { canvas, width: exportWidth, height: exportHeight };
    }

    // 💾 匯出圖片
    async function exportComposite() {
        if (!compositeRenderer || !compositeCamera) return alert('請先初始化合成場景!');
        document.getElementById('compositeResult').innerHTML = '<div class="text-cyan-400 p-2 animate-pulse font-bold">⏳ 正在生成高畫質圖片...</div>';

        const { canvas, width, height } = await generateCompositeCanvas();
        const format = document.getElementById('exportFormat').value;
        const mimeType = format === 'jpg' ? 'image/jpeg' : 'image/png';

        const link = document.createElement('a');
        link.download = '支撐合成圖_' + new Date().getTime() + '.' + format;
        link.href = canvas.toDataURL(mimeType, 0.95);
        link.click();

        document.getElementById('compositeResult').innerHTML =
            `<div class="text-green-400 p-2 font-bold">✅ 匯出成功! (${width}×${height})</div>`;
    }

    // 📱 分享圖片
    async function shareComposite() {
        if (!compositeRenderer) return alert('請先初始化合成場景!');
        document.getElementById('compositeResult').innerHTML = '<div class="text-cyan-400 p-2 animate-pulse font-bold">⏳ 正在準備高畫質分享...</div>';

        const { canvas } = await generateCompositeCanvas();

        canvas.toBlob(function (blob) {
            if (!blob) return alert('生成圖片失敗!');
            const file = new File([blob], '支撐模型合成圖_' + new Date().getTime() + '.png', { type: 'image/png' });

            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({
                    files: [file],
                    title: '支撐模型合成圖'
                }).then(() => {
                    document.getElementById('compositeResult').innerHTML = '<div class="text-green-400 p-2 font-bold">✅ 分享成功!</div>';
                }).catch(() => {
                    fallbackDownloadLink(file, blob);
                });
            } else {
                fallbackDownloadLink(file, blob);
            }
        }, 'image/png');
    }

    function fallbackDownloadLink(file, blob) {
        const link = document.createElement('a');
        link.download = file.name;
        link.href = URL.createObjectURL(blob);
        link.click();
        document.getElementById('compositeResult').innerHTML = '<div class="text-orange-400 p-2 font-bold">📥 已自動下載圖片</div>';
    }

    function lockModelState() {
      if (!currentModel) return;

      // 保存當前模型狀態
      currentModel.userData.originalState = {
        position: currentModel.position.clone(),
        rotation: currentModel.rotation.clone(),
        scale: currentModel.scale.clone(),
        visible: currentModel.visible
      };
    }

    // 恢復模型狀態
    function restoreModelState() {
      if (!currentModel || !currentModel.userData.originalState) return;

      const state = currentModel.userData.originalState;
      currentModel.position.copy(state.position);
      currentModel.rotation.copy(state.rotation);
      currentModel.scale.copy(state.scale);
      currentModel.visible = state.visible;
    }
    // 添加邊界檢查函數，確保模型不會被意外剪裁
    function checkModelBounds() {
      if (!currentModel || !compositeCamera) return;

      const box = new THREE.Box3().setFromObject(currentModel);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      // 檢查模型是否在相機視錐體內
      const frustum = new THREE.Frustum();
      frustum.setFromProjectionMatrix(
        new THREE.Matrix4().multiplyMatrices(
          compositeCamera.projectionMatrix,
          compositeCamera.matrixWorldInverse
        )
      );

      const modelInFrustum = frustum.intersectsBox(box);

      if (!modelInFrustum) {
        console.warn('模型部分或全部在視圖外，建議重新居中');
        return false;
      }

      return true;
    }

    // 定期檢查模型邊界（可選）
    setInterval(() => {
      if (currentModel) {
        checkModelBounds();
      }
    }, 2000);
