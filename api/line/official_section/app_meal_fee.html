<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誤餐費申請</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../mission_folder/supabase_config.js"></script>
    <!-- 🚀 前端無損產檔黑科技引擎 (Docxtemplater & PizZip & FileSaver) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip-utils.js"></script>
    <style>
        /* 🚨 關鍵修復：底色交給 html */
        html {
            background-color: #030712;
            min-height: 100vh;
        }

        body { 
            background-color: transparent; 
            color: #e2e8f0; 
            font-family: -apple-system, sans-serif; 
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
            margin: 0;
        }

        /* 1. 流動溪水波浪 (在底部不斷旋轉的液態感) */
        body::before {
            content: ""; position: fixed; bottom: -100px; left: -50%; width: 200%; height: 300px;
            background: radial-gradient(ellipse at center, rgba(14, 165, 233, 0.2) 0%, transparent 70%);
            border-radius: 40% 45% 42% 38%;
            animation: water-flow 12s infinite linear;
            z-index: -1;
        }

        @keyframes water-flow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 2. 電色火花漂浮背景 */
        body::after {
            content: ""; position: fixed; inset: 0;
            background-image: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: spark-drift 20s infinite linear;
            z-index: -2;
        }

        @keyframes spark-drift {
            0% { background-position: 0 0; }
            100% { background-position: 40px 100vh; }
        }

        .glass { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            /* 🚀 加上這兩行：確保點擊權限 */
            position: relative;
            z-index: 10;
        }

        /* 3. 閃電脈衝輸入框 */
        .input-neon { 
            background: rgba(30, 41, 59, 0.5); 
            border: 1px solid #1e293b; color: #fff; padding: 10px 12px; border-radius: 8px; width: 100%; 
            outline: none; transition: 0.3s; font-size: 16px !important;
        }
        
        .input-neon:focus { 
            border-color: #7dd3fc; 
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            /* 點擊時產生電力不穩的閃爍感 */
            animation: electricity-pulse 0.15s infinite alternate;
        }

        @keyframes electricity-pulse {
            from { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.4); }
            to { border-color: #f0f9ff; box-shadow: 0 0 20px rgba(56,189,248,0.8); }
        }

        /* ⚡ 強化版：超頻流光按鈕 */
        .btn-glow { 
            position: relative;
            background: linear-gradient(90deg, #0284c7, #38bdf8, #818cf8, #0284c7);
            background-size: 300% 100%;
            color: white; padding: 16px; border-radius: 12px; font-weight: 900; width: 100%; 
            text-transform: uppercase; letter-spacing: 4px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
            transition: all 0.3s;
            /* 🚀 動態流光動畫 */
            animation: flow-shimmer 3s linear infinite;
        }
        /* 🤖 閃爍掃描線：增加隨機科技感 */
        .btn-glow::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: none;
            /* 🚀 不規則掃描：模擬數據讀取 */
            animation: scan-line 2.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes scan-line {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* 💥 過載模式：點擊後的「震動與電湧」效果 */
        .btn-glow.overloading {
            animation: btn-shake 0.1s infinite alternate, flow-shimmer 0.5s linear infinite !important;
            filter: brightness(1.5) contrast(1.2);
            box-shadow: 0 0 30px #7dd3fc, 0 0 60px rgba(125, 211, 252, 0.4);
        }

        @keyframes btn-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -1px) rotate(0.5deg); }
        }
        
        @keyframes flow-shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes btn-lightning {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .btn-glow:active { transform: scale(0.98); }
        .btn-glow:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; animation: none; box-shadow: none; }
        
        .badge-add { background: linear-gradient(135deg, #06b6d4, #3b82f6); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: transform 0.2s;}
        .badge-add:active { transform: scale(0.85) rotate(90deg); }
        .item-card { border-left: 4px solid #0ea5e9; margin-bottom: 12px; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 🌀 特效 A：黑洞吞噬 (用於返回) - 旋轉縮小並消失 */
        .exit-vortex {
            transform: rotate(720deg) scale(0) !important;
            filter: blur(15px) hue-rotate(90deg) !important;
            opacity: 0 !important;
            transition: all 0.7s cubic-bezier(0.7, 0, 0.3, 1) !important;
            pointer-events: none;
        }

        /* 💥 超新星爆發：極速放大、亮度過載並消失 */
        .exit-supernova {
            transform: scale(8) !important;
            filter: brightness(15) contrast(2) blur(10px) !important;
            opacity: 0 !important;
            transition: all 0.6s cubic-bezier(0.7, 0, 0.3, 1) !important;
            pointer-events: none;
            z-index: 1000;
        }

        /* ⚡ 電漿閃光層：覆蓋全螢幕的瞬間強光 */
        .plasma-flash {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #fff 0%, #7dd3fc 40%, transparent 100%);
            opacity: 0;
            z-index: 999;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .plasma-flash.active {
            opacity: 0.9;
        }
        /* 🌀 全螢幕黑洞吸入特效：旋轉三圈、縮小到零、邊緣模糊 */
        .screen-vortex-exit {
            transform: rotate(1080deg) scale(0) !important;
            filter: blur(20px) brightness(2) !important;
            opacity: 0 !important;
            transition: all 0.8s cubic-bezier(0.7, 0, 0.3, 1) !important;
            pointer-events: none;
        }

        /* 確保主容器有預設的過渡效果 */
        .max-w-md {
            transition: transform 0.8s, opacity 0.8s;
        }
    </style>
</head>
<body class="p-4 pb-12">
    <div class="max-w-md mx-auto">
        
        <header class="mb-6 relative flex items-center justify-center">
            <button onclick="vortexExit('app_docs.html', this)" class="absolute left-0 text-cyan-400 ...">◀ 返回</button>
            <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">誤餐費申請</h1>
        </header>

        <div class="glass p-5 mb-6">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">所屬單位</label>
            <select id="unit" class="input-neon mb-5 text-sm">
                <option>特搜大隊山域義消</option>
                <option>特搜大隊水域義消</option>
                <option>特搜大隊空拍義消</option>
                <option>特搜大隊</option>
                <option>吉安分隊</option>
            </select>

            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">月份</label>
                    <select id="month" class="input-neon text-sm" onchange="updateDays()"></select>
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">日期</label>
                    <select id="day" class="input-neon text-sm"></select>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-blue-300">品項清單</h2>
            <button onclick="addItem()" class="badge-add shadow-lg">+</button>
        </div>
        
        <div id="itemsContainer"></div>

        <div class="glass p-5 mb-8 border-t-2 border-cyan-500">
            <div class="flex justify-between items-center">
                <span class="text-slate-400">預計總金額</span>
                <span id="totalDisplay" class="text-3xl font-black text-cyan-400">$ 0</span>
            </div>
        </div>

        <button id="submitBtn" onclick="submitForm()" class="btn-glow shadow-xl flex items-center justify-center gap-3">
            <span id="submitText">生成檔案並開啟</span>
            <div id="loader" class="loader"></div>
        </button>
    </div>

    <script>
        // --- 📝 修改後的初始化邏輯 ---
        async function checkSession() {
            // 先跑初始化，讓使用者點開就能看到月份
            init(); 
            
            const { data } = await _supabase.auth.getSession();
            if (!data.session) {
                // 如果沒登入，才踢人
                window.location.href = `../lobby.html?redirect=${encodeURIComponent(window.location.href)}`;
            }
        }
        window.onload = checkSession;

        // --- 📝 表單邏輯 ---
        let itemCount = 0;
        // 🚨 這裡填入你主系統正在用的 GAS API 網址 (與裝備系統相同那個)
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwPPgRYU_hsKv1rb9H1Rqo49sMh4P4UjY5559lGUEzhwpM_eIroz_W9xBYuvfCU87b-/exec"; 

        function init() {
            const now = new Date();
            const mSelect = document.getElementById('month');
            for(let i=1; i<=12; i++) {
                let opt = new Option(i + '月', i);
                if(i === now.getMonth() + 1) opt.selected = true;
                mSelect.add(opt);
            }
            updateDays();
            document.getElementById('day').value = now.getDate();
            addItem();
        }

        function updateDays() {
            const month = document.getElementById('month').value;
            const daySelect = document.getElementById('day');
            const daysInMonth = new Date(new Date().getFullYear(), month, 0).getDate();
            daySelect.innerHTML = '';
            for(let i=1; i<=daysInMonth; i++) {
                daySelect.add(new Option(i + '日', i));
            }
        }

        function addItem() {
            if(itemCount >= 8) return alert('最多只能新增 8 項喔！');
            itemCount++;
            const div = document.createElement('div');
            div.className = 'glass p-4 mb-3 item-card relative pt-8';
            div.id = 'row' + itemCount;
            
            div.innerHTML = `
                <button onclick="removeItem(${itemCount})" class="absolute top-2 right-3 text-slate-500 text-xs hover:text-red-400">✕ 移除項目</button>
                <div class="flex gap-2 mb-3">
                    <div class="w-1/2"><label class="text-[10px] text-slate-500 ml-1">品名</label><input type="text" value="便當" class="input-neon text-base row-n"></div>
                    <div class="w-1/4"><label class="text-[10px] text-slate-500 ml-1">規格</label><input type="text" class="input-neon text-base row-s text-center"></div>
                    <div class="w-1/4"><label class="text-[10px] text-slate-500 ml-1">單位</label><input type="text" value="盒" class="input-neon text-base row-u text-center"></div>
                </div>
                <div class="flex gap-2 items-end bg-slate-800 bg-opacity-40 p-2 rounded-lg">
                    <div class="w-1/3"><label class="text-[10px] text-slate-400 ml-1">數量</label><input type="number" placeholder="0" class="input-neon text-base row-q" oninput="calc(${itemCount})"></div>
                    <div class="w-1/3"><label class="text-[10px] text-slate-400 ml-1">單價</label><input type="number" value="100" class="input-neon text-base row-p" oninput="calc(${itemCount})"></div>
                    <div class="w-1/3 flex flex-col items-center justify-center pb-2">
                        <span class="text-[10px] text-slate-400 mb-1">小計</span>
                        <span class="text-cyan-400 font-bold text-lg row-t-display">0</span>
                    </div>
                    <input type="hidden" class="row-t">
                </div>
            `;
            document.getElementById('itemsContainer').appendChild(div);
            calc(itemCount); 
        }

        function removeItem(id) { document.getElementById('row' + id).remove(); itemCount--; updateTotal(); }
        function calc(id) {
            const row = document.getElementById('row' + id);
            // 確保抓到的是數字
            const q = parseFloat(row.querySelector('.row-q').value) || 0;
            const p = parseFloat(row.querySelector('.row-p').value) || 0;
            
            // 🚀 核心黑科技：Math.floor() 無條件捨去小數點
            const t = Math.floor(q * p); 
            
            row.querySelector('.row-t').value = t; 
            row.querySelector('.row-t-display').innerText = t;
            updateTotal();
        }
        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.row-t').forEach(el => total += parseFloat(el.value || 0));
            document.getElementById('totalDisplay').innerText = '$ ' + total;
        }

        // 🚀 讀取本地範本的輔助函數
        function loadFile(url, callback) {
            PizZipUtils.getBinaryContent(url, callback);
        }

        // 🚀 終極版：純前端產出 Word 檔 (無損不跑版)
        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const submitText = document.getElementById('submitText');
            
            // 1. 抓取品項資料
            const items = [];
            let totalAmount = 0;
            document.querySelectorAll('#itemsContainer > div').forEach(row => {
                const q = row.querySelector('.row-q').value;
                const n = row.querySelector('.row-n').value;
                if(n || q) {
                    const itemTotal = Math.floor(parseFloat(row.querySelector('.row-t').value) || 0);
                    items.push({
                        n: n, s: row.querySelector('.row-s').value,
                        u: row.querySelector('.row-u').value, q: q,
                        p: row.querySelector('.row-p').value, t: itemTotal.toString()
                    });
                    totalAmount += itemTotal;
                }
            });

            if(items.length === 0) return alert('請至少填寫一項品項！');

            // 啟動過載視覺效果
            btn.disabled = true;
            btn.classList.add('overloading'); 
            loader.style.display = 'block';
            submitText.innerText = "⚡ 正在生成本地 Word 檔...";

            // 2. 準備要塞進 Word 的資料字典
            let templateData = {
                UNIT: document.getElementById('unit').value,
                TIME_M: document.getElementById('month').value,
                TIME_D: document.getElementById('day').value,
                ITEM_A: totalAmount.toString(),
                
                // 🚀 更安全、更純粹的 Word 底層分頁指令
                PAGE_BREAK: '<w:br w:type="page"/>'
            };

            // 將品項填入 ITEM1_N ~ ITEM8_N
            for(let i = 0; i < 8; i++) {
                const idx = i + 1;
                const item = items[i];
                templateData[`ITEM${idx}_N`] = item ? item.n : "";
                templateData[`ITEM${idx}_S`] = item ? item.s : "";
                templateData[`ITEM${idx}_U`] = item ? item.u : "";
                templateData[`ITEM${idx}_Q`] = item ? item.q : "";
                templateData[`ITEM${idx}_P`] = item ? item.p : "";
                templateData[`ITEM${idx}_T`] = item ? item.t : "";
            }

            // 處理數字拆分 N8, N7... (模擬原本 GAS 邏輯)
            const fullAmountStr = "實付$" + totalAmount;
            const chars = fullAmountStr.split('').reverse(); 
            for (let j = 1; j <= 8; j++) {
                templateData[`N${9 - j}`] = chars[j - 1] || ''; 
            }

            // 3. 核心黑科技：讀取本機的 docx 範本並替換字串
            loadFile("template_meal_fee.docx", function (error, content) {
                if (error) {
                    btn.classList.remove('overloading');
                    btn.disabled = false; loader.style.display = 'none'; submitText.innerText = "生成檔案並下載";
                    return alert("讀取 Word 範本失敗，請確認 'template_meal_fee.docx' 已放入專案！\n" + error);
                }

                try {
                    const zip = new PizZip(content);
                    const doc = new window.docxtemplater(zip, { 
                        paragraphLoop: true, 
                        linebreaks: true,
                        delimiters: { start: '{{', end: '}}' } // 🚀 關鍵修復：強制引擎認得雙括號！
                    });
                    
                    // 執行資料替換
                    doc.render(templateData);
                    
                    // 生成最終的 Word Blob 檔案
                    const out = doc.getZip().generate({
                        type: "blob",
                        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                    });
                    
                    const fileName = `${templateData.TIME_M}月份誤餐費_${templateData.UNIT}.docx`;
                    
                    // 建立/抓取閃光層
                    let flash = document.querySelector('.plasma-flash');
                    if (!flash) { flash = document.createElement('div'); flash.className = 'plasma-flash'; document.body.appendChild(flash); }

                    // 💥 引爆超新星特效
                    btn.classList.add('exit-supernova');
                    setTimeout(() => flash.classList.add('active'), 100);

                    // 延遲觸發下載或分享，並恢復按鈕
                    setTimeout(async () => {
                        // 🚀 偵測裝置屬性
                        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

                        if (isIOS && navigator.canShare) {
                            // 🍎 iOS 路線：直接啟動原生分享選單
                            try {
                                // 把 Blob 包裝成實體 File 檔案
                                const file = new File([out], fileName, { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
                                
                                if (navigator.canShare({ files: [file] })) {
                                    await navigator.share({
                                        files: [file],
                                        title: '誤餐費申請單',
                                        text: '請查收誤餐費申請單 Word 檔'
                                    });
                                } else {
                                    saveAs(out, fileName); // 萬一不支援，退回直接下載
                                }
                            } catch (err) {
                                console.log("iOS 分享取消或失敗", err);
                                // 使用者按取消不用報錯，默默收起即可
                            }
                        } else {
                            // 🤖 安卓 & 💻 電腦路線：直接啟動超高速下載！
                            saveAs(out, fileName);
                        }
                        
                        // 清理現場
                        flash.classList.remove('active');
                        btn.classList.remove('exit-supernova', 'overloading');
                        btn.disabled = false; loader.style.display = 'none'; submitText.innerText = "生成檔案";
                    }, 600);

                } catch (err) {
                    btn.classList.remove('overloading');
                    btn.disabled = false; loader.style.display = 'none'; submitText.innerText = "生成檔案";
                    alert("產出檔案發生錯誤：" + err.message);
                }
            });
        }

        // 🚀 戰術導航：根據模式觸發不同動畫
        function warpSpeed(url, element, mode = 'vortex') {
            // 1. 建立閃光層
            let flash = document.querySelector('.plasma-flash');
            if (!flash) {
                flash = document.createElement('div');
                flash.className = 'plasma-flash';
                document.body.appendChild(flash);
            }

            // 2. 根據模式執行不同動畫
            if (mode === 'vortex') {
                element.classList.add('exit-vortex');
            } else {
                element.classList.add('exit-supernova');
            }

            // 3. 觸發閃光
            setTimeout(() => flash.classList.add('active'), 100);

            // 4. 傳送回指定頁面
            setTimeout(() => {
                window.location.href = url;
            }, 600);
        }

        function vortexExit(url, element) {
            // 1. 抓取主容器 (包裹所有內容的那個 div)
            const container = document.querySelector('.max-w-md');
            
            // 2. 核心黑科技：計算按鈕在螢幕上的精確中心座標
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // 3. 動態設定縮小的「中心點」為按鈕的位置
            container.style.transformOrigin = `${centerX}px ${centerY}px`;
            
            // 4. 啟動按鈕本身的旋轉 (保持之前的帥度)
            element.style.transition = "all 0.4s ease";
            element.style.transform = "rotate(360deg) scale(0)";
            
            // 5. 啟動全畫面的「吸入」特效
            container.classList.add('screen-vortex-exit');

            // 6. 動畫時間稍微拉長到 0.75 秒，讓「吸進去」的感覺更完整
            setTimeout(() => {
                window.location.href = url;
            }, 750);
        }
    </script>
</body>
</html>
