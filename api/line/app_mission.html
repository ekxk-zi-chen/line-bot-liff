<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>花蓮特搜戰情中心</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="花搜戰情">
    <link rel="apple-touch-icon" href="rescue192.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* =========================================
           1. 全局佈局 (釋放原生滾動，讓手機畫面最大化)
           ========================================= */
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* 🔥 關鍵：刪除 height: 100vh 和 overflow: hidden，讓網頁自然往下長 */
            margin: 0;
            padding: 0;
            /* 防止 iOS 左右滑動的橡皮筋效應，但不限制上下 */
            overflow-x: hidden;
        }

        /* 頂部固定區 (Header + 篩選器) */
        #top-fixed-area {
            /* 🔥 關鍵：黏性定位，往下滑時自動吸附在螢幕最上方，不會被捲走 */
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: #1a1a1a;
            /* 確保滑動時背景不會透明重疊 */
            /* 加上一點柔和的陰影，讓往下滑時標題區更有立體感 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            padding-top: 15px;
            /* 依照您原本的頂部間距 */
            padding-left: 15px;
            padding-right: 15px;
        }

        /* 列表內容區 */
        #scrollable-content {
            /* 🔥 放棄內部的自動滾動，全部交給 body 原生滾動 */
            overflow: visible;
            padding-left: 15px;
            padding-right: 15px;
            padding-bottom: 120px;
            /* 留出足夠的底部空間，避免最後一張卡片被「匯出/借出」大按鈕擋住 */
        }

        /* 內容捲動區 (只有這裡可以滑動) */
        #content-area {
            flex-grow: 1;
            /* 佔滿剩餘空間 */
            overflow-y: auto;
            /* 垂直捲動 */
            padding: 16px;
            /* 原本 body 的 p-4 移到這裡 */
            padding-bottom: 120px;
            /* 預留給底部工具列的空間 */
            scroll-behavior: smooth;
        }

        /* =========================================
           2. 新版膠囊篩選器 (Chip/Pill Styles)
           ========================================= */
        /* 橫向滑動容器 */
        .filter-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 16px;
            white-space: nowrap;
            -ms-overflow-style: none;
            scrollbar-width: none;
            /* 🔥 新增這行：讓游標變成可以抓取的小手 */
            cursor: grab;
        }

        /* 🔥 新增這個樣式：按下去的時候變成「緊握」的小手 */
        .filter-row:active {
            cursor: grabbing;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari */
        }

        /* 膠囊按鈕本體 */
        .btn-chip {
            background-color: #333;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 9999px;
            /* 圓形膠囊 */
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #444;
            transition: all 0.2s;
            flex-shrink: 0;
            /* 防止被擠壓 */
        }

        /* 選中狀態 */
        .btn-chip.active {
            background-color: #ca8a04;
            /* 黃色 */
            color: white;
            border-color: #ca8a04;
            box-shadow: 0 0 8px rgba(202, 138, 4, 0.4);
        }

        /* =========================================
           3. 共用元件 (Legacy Components)
           ========================================= */
        .card {
            background-color: #2d2d2d;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 5px solid #4CAF50;
        }

        /* 按鈕通用樣式 */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-green {
            background-color: #4CAF50;
            color: white;
            border: none;
        }

        .btn-red {
            background-color: #f44336;
            color: white;
            border: none;
        }

        .btn-blue {
            background-color: #2196F3;
            color: white;
            border: none;
        }

        /* 舊版篩選按鈕 (若還有用到的話) */
        .btn-filter {
            transition: all 0.2s;
        }

        .btn-filter.active {
            background-color: #ca8a04;
            color: white;
        }

        /* 輸入框優化 */
        .input-dark {
            width: 100%;
            background-color: #374151;
            color: white;
            padding: 10px 14px;
            border-radius: 20px;
            /* 變圓一點比較好看 */
            border: 1px solid #4b5563;
            outline: none;
            font-size: 14px;
        }

        .input-dark:focus {
            border-color: #f59e0b;
            background-color: #4b5563;
        }

        /* 工具類 */
        .hidden {
            display: none !important;
        }

        .loader {
            border: 4px solid #333;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* =========================================
           4. 任務看板專用 (Mission Board)
           ========================================= */
        .mission-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #333;
            border-radius: 0 0 12px 12px;
        }

        .mission-detail.open {
            max-height: 800px;
            border-top: 1px solid #444;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* =========================================
           5. 捲軸與彈窗 (Modals & Scrollbars)
           ========================================= */
        /* 自定義捲軸 */
        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 2px;
        }

        /* 彈窗背景 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
        }

        .modal-overlay.flex {
            display: flex !important;
        }

        /* 批次操作表格 */
        .batch-table th {
            position: sticky;
            top: 0;
            background: #374151;
            color: #ddd;
            padding: 8px;
            text-align: left;
        }

        .batch-table td {
            border-bottom: 1px solid #4b5563;
            padding: 8px;
            color: #eee;
        }

        /* =========================================
           6. 山豬特搜動畫 (Loading Animation)
           ========================================= */
        #boar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .boar-scene {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }

        .boar-text {
            color: #4CAF50;
            font-weight: bold;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }

        #status-filter {
            text-align-last: center; /* 讓選中的值在 select 裡面置中 */
            padding-left: 0;
            padding-right: 0;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body class="p-4">

    <div id="login-screen"
        class="fixed inset-0 bg-gray-900 flex flex-col items-center justify-center z-[100] px-4 overflow-y-auto pt-10 pb-10">
        <div class="w-full max-w-md bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700">
            <div class="text-center mb-6">
                <div class="text-4xl mb-2">🚒</div>
                <h1 class="text-xl font-bold text-white tracking-wider">花蓮特搜戰情中心</h1>
            </div>

            <div class="flex mb-6 bg-gray-900 p-1 rounded-lg border border-gray-700 text-center">
                <button onclick="switchAuthTab('login')" id="tab-login"
                    class="flex-1 py-2 rounded-md text-sm font-bold transition-all bg-indigo-600 text-white">登入</button>
                <button onclick="switchAuthTab('bind')" id="tab-bind"
                    class="flex-1 py-2 rounded-md text-sm font-bold transition-all text-gray-400">信箱綁定</button>
                <button onclick="switchAuthTab('signup')" id="tab-signup"
                    class="flex-1 py-2 rounded-md text-sm font-bold transition-all text-gray-400">註冊申請</button>
            </div>

            <div id="form-login" class="space-y-4">
                <input type="email" id="login-email" placeholder="電子信箱" class="input-dark py-3">
                <input type="password" id="login-password" placeholder="密碼" class="input-dark py-3">
                <button onclick="handleLogin()" id="login-btn"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg mt-2">安全登入</button>
            </div>

            <div id="form-bind" class="hidden space-y-4">
                <div class="text-xs text-yellow-400 bg-yellow-900/30 p-2 rounded border border-yellow-700 mb-2">
                    💡 老隊員請輸入您在系統登記的信箱，並設定 App 登入密碼以完成綁定。
                </div>
                <input type="email" id="bind-email" placeholder="輸入已登記的電子信箱" class="input-dark py-3">

                <div class="grid grid-cols-2 gap-2">
                    <input type="password" id="bind-password" placeholder="設定密碼 (至少6碼)" class="input-dark py-3 text-sm">
                    <input type="password" id="bind-confirm" placeholder="確認密碼" class="input-dark py-3 text-sm">
                </div>

                <button onclick="handleBind()" id="bind-btn"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-2">確認綁定</button>
            </div>

            <div id="form-signup" class="hidden space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="email" id="reg-email" placeholder="電子信箱" class="input-dark text-sm">
                    <input type="text" id="reg-name" placeholder="真實姓名" class="input-dark text-sm">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="password" id="reg-password" placeholder="設定密碼" class="input-dark text-sm">
                    <input type="password" id="reg-confirm" placeholder="確認密碼" class="input-dark text-sm">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg-unit" onchange="toggleOtherUnit()" class="input-dark text-sm bg-gray-700">
                        <option value="">載入單位中...</option>
                    </select>
                    <input type="text" id="reg-title" placeholder="職稱 (如隊員)" class="input-dark text-sm">
                </div>
                <input type="text" id="reg-unit-other" placeholder="👉 請輸入單位名稱"
                    class="input-dark hidden text-sm border-indigo-500">
                <input type="tel" id="reg-phone" placeholder="連絡電話" class="input-dark text-sm">
                <textarea id="reg-note" placeholder="申請備註" class="input-dark text-sm h-16 py-2"></textarea>

                <button onclick="handleRealSignUp()" id="signup-btn"
                    class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg mt-2">提交新註冊</button>
            </div>
        </div>
    </div>

    <div id="boar-overlay" class="hidden">
        <div id="boar-anim" class="boar-scene">🐗</div>
        <p id="boar-text" class="boar-text">資料處理中...</p>
    </div>
    <div id="header" class="mb-3 text-center">
        <h1 class="text-xl font-bold text-green-400 mb-1">🚒 花蓮特搜行動系統</h1>

        <div class="relative flex justify-center items-center h-6">
            <div class="flex items-center gap-2">
                <p id="user-info" class="text-sm text-gray-400">識別中...</p>
                <button onclick="handleLogout()"
                    class="bg-red-900/60 hover:bg-red-800 text-red-300 px-2 py-0.5 rounded border border-red-700 text-xs transition-colors">登出</button>
            </div>

            <select id="custodian-filter" onchange="switchCustodian(this.value)"
                class="absolute right-0 bg-gray-800 text-indigo-300 text-xs py-1 px-1 rounded border border-indigo-700 outline-none max-w-[100px]">
                <option value="All">所有🛡️</option>
            </select>
        </div>
    </div>

    <div id="loader" class="loader"></div>

    <div id="view-report" class="hidden">
        <h2 class="text-lg font-bold mb-2">📝 您的任務回報</h2>
        <div id="report-list"></div>
    </div>
    <div id="view-query" class="hidden">
        <h2 class="text-lg font-bold mb-2">🔍 進行中任務看板</h2>
        <div id="query-list"></div>
    </div>

    <div id="view-ai" class="hidden">
        <h2 class="text-lg font-bold mb-2">🤖 AI 戰情/簡報中心</h2>
        <div class="bg-gray-800 p-3 rounded mb-3 border border-gray-700">
            <p class="text-sm text-gray-400 mb-1">請輸入目標</p><input type="text" id="ai-input" class="input-dark"
                placeholder="例如: 土耳其...">
        </div>
        <div class="flex gap-2 mb-3"><button onclick="safeExecute(this, () => askAI('text'))"
                class="btn btn-blue flex-1">💬 分析</button><button onclick="safeExecute(this, () => askAI('ppt'))"
                class="btn btn-red flex-1">📊 簡報</button></div>
        <a href="https://drive.google.com/drive/folders/1XAtHLGeo2fQH3wO5Lfq5_IjunbkIqzn_" target="_blank"
            class="btn block text-center mb-4" style="background-color: #FF9800; color: white;">📂 開啟歸檔</a>
        <div id="ai-response" class="mt-4 p-4 bg-gray-800 rounded border-l-4 border-green-500 hidden"></div>
    </div>

    <div id="view-equipment" class="hidden h-full flex flex-col">

        <div id="top-fixed-area" class="pb-1 bg-gray-900 border-b border-gray-800">

            <div class="flex justify-between items-center px-4 py-2">
                <div class="flex items-center gap-2">
                    <h2 class="text-base font-bold text-yellow-400">🎒</h2>
                    <button onclick="toggleFilterPanel()" id="btn-toggle-filter"
                        class="text-xs bg-gray-800 text-gray-400 border border-gray-600 px-2 py-1 rounded flex items-center gap-1 transition-colors">
                        <span>🔍</span>
                    </button>
                </div>

                <div class="flex gap-2">
                    <select id="status-filter" onchange="renderEquipmentList()"
                        class="bg-gray-800 text-gray-300 text-xs py-1 rounded border border-gray-700 outline-none w-[45px] text-center appearance-none">
                        <option value="All">▽</option>
                        <option value="Borrowed">借出</option>
                        <option value="InStock">在隊</option>
                        <option value="Repair">維修中</option>
                    </select>

                    <button onclick="fetchHistory()"
                        class="text-xs text-blue-400 border border-blue-400 px-2 py-1 rounded">📜</button>

                    <button id="toggle-image-mode-btn" onclick="toggleImageDisplayMode()"
                        class="text-xs text-purple-400 border border-purple-400 px-2 py-1 rounded transition-colors">🖼️</button>
                    <button onclick="fetchEquipmentData(true)"
                        class="text-xs text-green-400 border border-green-400 px-2 py-1 rounded">🔄</button>

                </div>
            </div>

            <div id="collapsible-filters" class="transition-all duration-300 overflow-hidden"
                style="max-height: 0px; opacity: 0;">
                <div class="px-4 pb-2">
                    <input type="text" id="eq-search" oninput="renderEquipmentList()" class="input-dark w-full text-xs"
                        placeholder="🔍 搜尋裝備名稱、型號...">
                </div>

                <div id="category-filter-container" class="filter-row"></div>

                <div id="subcategory-filter-container" class="filter-row hidden"></div>

                <div id="location-filter-container" class="filter-row hidden"></div>

                <div id="note-filter-container" class="filter-row hidden"></div>
                <div class="h-2"></div>
            </div>
        </div>

        <div id="content-area">
            <div class="flex gap-2 mb-2">
                <button onclick="toggleExportMode()" id="btn-export-mode"
                    class="flex-1 bg-purple-600/90 text-white py-2 rounded-lg font-bold text-sm shadow transition-all hover:bg-purple-600 flex items-center justify-center gap-1">
                    <span>📊</span> 批量/匯出
                </button>

                <button id="btn-add-eq" onclick="openEditModal('create')"
                    class="hidden w-1/4 bg-yellow-600 text-white border border-yellow-500 py-2 rounded-lg font-bold text-sm shadow hover:bg-yellow-500 transition-all whitespace-nowrap">
                    +新增
                </button>
            </div>

            <div id="equipment-list" class="space-y-2 pb-20"></div>
        </div>

        <div id="export-toolbar"
            class="hidden fixed bottom-4 left-4 right-4 bg-gray-900 border border-purple-500 p-3 rounded-lg shadow-2xl z-40 flex flex-col gap-3">
            <div class="flex justify-between items-center border-b border-gray-700 pb-2">
                <div class="text-white text-sm">已選 <span id="export-count"
                        class="text-yellow-400 font-bold text-lg">0</span> 項</div><button id="btn-select-all"
                    onclick="toggleSelectAll()" class="bg-gray-700 text-white px-3 py-1 rounded text-xs">全選</button>
            </div>
            <div class="flex gap-2">
                <button id="btn-batch-borrow" onclick="openBatchBorrowModal()"
                    class="hidden flex-1 bg-blue-600 text-white py-2 rounded font-bold text-sm shadow">批量借出</button>
                <button id="btn-batch-return" onclick="openBatchReturnModal()"
                    class="hidden flex-1 bg-green-600 text-white py-2 rounded font-bold text-sm shadow">批量歸還</button>
                <button onclick="confirmExport()"
                    class="flex-1 bg-purple-600 text-white py-2 rounded font-bold text-sm shadow">匯出</button>
            </div>
        </div>
    </div>

    <div id="batch-borrow-modal" class="modal-overlay">
        <div class="bg-gray-800 p-5 rounded-lg w-full max-w-md border border-blue-500 flex flex-col max-h-[90vh]">
            <h3 class="text-xl font-bold mb-4 text-blue-400">📦 借出裝備</h3>
            <div class="mb-3"><label class="block text-gray-400 text-sm mb-1">借用人 (必填)</label><input type="text"
                    id="batch-borrower" class="input-dark"></div>
            <div class="mb-3 flex gap-4 border-b border-gray-700 pb-2">
                <label class="flex items-center text-gray-200 text-sm cursor-pointer font-bold">
                    <input type="radio" name="borrow_mode" value="borrow" checked onchange="toggleBorrowMode()"
                        class="mr-2 w-4 h-4">
                    一般借出
                </label>
                <label class="flex items-center text-orange-400 text-sm cursor-pointer font-bold">
                    <input type="radio" name="borrow_mode" value="repair" onchange="toggleBorrowMode()"
                        class="mr-2 w-4 h-4 accent-orange-500">
                    裝備報修
                </label>
            </div>

            <div id="borrow-fields" class="mb-3 flex gap-2">
                <div class="flex-1">
                    <label class="block text-gray-400 text-sm mb-1">用途</label>
                    <input type="text" id="batch-note" list="note-suggestions" class="input-dark" placeholder="例如: 雪訓">
                </div>
                <div class="flex-1">
                    <label class="block text-gray-400 text-sm mb-1">詳細補述</label>
                    <input type="text" id="batch-note2" class="input-dark" placeholder="例如: XL / 紅色">
                </div>
            </div>

            <div id="repair-fields" class="mb-3 hidden">
                <label class="block text-orange-400 text-sm mb-1">維修原因 (必填)</label>
                <input type="text" id="batch-repair-note" class="input-dark border-orange-500 focus:border-orange-400"
                    placeholder="例如: 螢幕破裂, 拉鍊損壞...">
            </div>
            <div
                class="flex-1 overflow-y-auto custom-scrollbar mb-2 border-t border-b border-gray-700 py-2 bg-gray-900 px-2">
                <table class="w-full text-sm text-left text-gray-400 batch-table">
                    <thead>
                        <tr>
                            <th class="w-1/2">裝備</th>
                            <th class="text-center">庫存</th>
                            <th class="w-20 text-center">數量</th>
                        </tr>
                    </thead>
                    <tbody id="batch-borrow-list"></tbody>
                </table>
            </div>

            <div class="flex justify-between items-center mb-2">
                <button onclick="hideBorrowModal()"
                    class="bg-gray-700 hover:bg-gray-600 text-gray-300 px-3 py-1.5 rounded-lg text-xs shadow-md border border-gray-600">🔍
                    縮小 / 選擇更多</button>

        const SUPABASE_URL = 'https://gltzwtqcrdpdumzitbib.supabase.co';

        let userId = "", userEmail = "", displayName = "", equipmentCache = [], currentCustodian = 'All', isExportMode = false, selectedItems = new Set(), loaderInterval;
        let activeCats = new Set(); let activeSubCats = new Set(); let activeLocs = new Set(); let activeNotes = new Set();

        window.submitToBackend = async function (payload) {

        // --- 全域工具函數 ---
        function toggleLoader(show, text = "處理中...") {
            const el = document.getElementById('boar-overlay'), txt = document.getElementById('boar-text'), anim = document.getElementById('boar-anim');
            if (show) { el.classList.remove('hidden'); txt.innerText = text; const icons = ['🐗💨', '🐗📦', '🐗📝', '🐗✅']; let i = 0; if (loaderInterval) clearInterval(loaderInterval); loaderInterval = setInterval(() => { anim.innerText = icons[i++ % icons.length]; }, 500); }
            else { el.classList.add('hidden'); if (loaderInterval) clearInterval(loaderInterval); }
        }

        // 🔥 2. 智慧路由器：自動判斷要直連 Supabase 還是去呼叫 GAS
        async function callGasApi(payload) {
            const action = payload.action;
            const rpcActions = ['get_equipment_list', 'manage_equipment', 'borrow_equipment', 'return_equipment', 'get_loan_history', 'batch_borrow_equipment', 'batch_return_equipment'];

            if (rpcActions.includes(action)) {
                let rpcParams = {};
                if (action === 'get_equipment_list') rpcParams = { p_category_filter: payload.category || 'All' };
                else if (action === 'manage_equipment') rpcParams = { p_user_id: userId, p_action: payload.mode, p_eq_id: payload.eqId || null, p_name: payload.name || '', p_category: payload.category || '', p_sub_category: payload.subCategory || '', p_model: payload.model || '', p_location: payload.location || '', p_custodian: payload.custodian || '', p_total_qty: payload.totalQty || 0, p_user_name: displayName };
                else if (action === 'borrow_equipment') rpcParams = { p_eq_id: payload.eqId, p_borrower_name: payload.borrower, p_qty: payload.qty, p_user_name: displayName, p_note: payload.note || '', p_note2: payload.note2 || '', p_user_id: userId };
                else if (action === 'return_equipment') rpcParams = { p_loan_id: payload.loanId, p_return_qty: payload.returnQty, p_user_name: displayName, p_user_id: userId };
                else if (action === 'get_loan_history') rpcParams = { p_user_id: userId, p_eq_id: payload.eqId || null };
                else if (action === 'batch_borrow_equipment') {
                    rpcParams = { p_user_id: userId, p_user_name: displayName, p_items: payload.items };
                }
                else if (action === 'batch_return_equipment') {
                    rpcParams = { p_user_id: userId, p_user_name: displayName, p_items: payload.items };
                }
                const { data, error } = await _supabase.rpc(action, rpcParams); // <--- 改名
                if (error) throw new Error(error.message);

                // 🔥 加上這行：如果資料庫明明白白說 success 是 false，就丟出拒絕原因！
                if (data && data.success === false) throw new Error(data.message);

                return data;
            }
            else if (action === 'check_user_role') {
                const { data, error } = await _supabase.rpc('check_is_admin_by_email', { p_email: userEmail }); // <--- 改名
                if (error) throw new Error(error.message);
                return { isAdmin: data };
            }
            else {
                const res = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify({ ...payload, source: 'liff' }) });
                return await res.json();
            }
        }

    <script>



        // =========================================
        // 🔒 App 專屬：Supabase 登入與自動驗證系統
        // =========================================

        // 🚀 自動從資料庫抓取「現有單位」並填入註冊選單
        async function loadDynamicUnits() {
            const { data, error } = await _supabase.rpc('get_existing_units');
            const unitSelect = document.getElementById('reg-unit');

            if (error) {
                console.error("抓取單位失敗:", error);
                unitSelect.innerHTML = '<option value="">手動輸入單位</option>';
                return;
            }

            if (data && data.length > 0) {
                let html = '<option value="">選擇單位</option>';
                data.forEach(item => {
                    html += `<option value="${item.unit_name}">${item.unit_name}</option>`;
                });
                html += '<option value="OTHER">--- 其他 (手動輸入) ---</option>';
                unitSelect.innerHTML = html;
            }
        }

        // 1. 處理使用者點擊登入
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            if (!email || !password) { alert("請輸入帳號密碼！"); return; }
            btn.innerText = "驗證中..."; btn.disabled = true;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password }); // <--- 改名
            if (error) {
                alert("登入失敗：" + error.message);
                btn.innerText = "安全登入"; btn.disabled = false;
                return;
            }
            enterSystem(data.user);
        }

        // --- 🚪 登出系統與清除本地快取 ---
        async function handleLogout() {
            if (!confirm("確定要登出並清除登入狀態嗎？")) return;

            toggleLoader(true, "登出中...");
            try {
                // 1. 呼叫 Supabase 登出，這行會「自動幫你把 LocalStorage 裡的憑證刪光光」
                await _supabase.auth.signOut();

                // 2. 清除網頁內存變數 (失憶)
                userId = "";
                userEmail = "";
                displayName = "";
                isUserAdmin = false;
                equipmentCache = [];

                // 3. 把管理員按鈕重新封印隱藏
                document.getElementById('btn-add-eq').classList.add('hidden');
                document.getElementById('btn-batch-borrow').classList.add('hidden');
                document.getElementById('btn-batch-return').classList.add('hidden');

                // 4. 切換畫面：隱藏裝備清單，顯示登入畫面
                document.getElementById('view-equipment').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');

                // 5. 順便把密碼框清空，保護隱私
                document.getElementById('login-password').value = "";

            } catch (error) {
                console.error("登出失敗:", error);
                alert("登出時發生錯誤");
            } finally {
                toggleLoader(false);
            }
        }

        // 2. 成功登入後，動態賦予身分並解鎖畫面
        async function enterSystem(user) {
            userEmail = user.email; // 先記錄信箱

            try {
                // 1. 抓取真實姓名
                const { data: realName } = await _supabase.rpc('get_user_name_by_email', { p_email: userEmail });

                const { data: dbUserId } = await _supabase.rpc('get_user_id_by_email', { p_email: userEmail });

                if (window.tempFCMToken) {
                    // 情境 A：有 Android 殼傳 Token 過來

                        requestWebPushPermission();
                    }

                // 更新 UI
                document.getElementById('user-info').innerText = `隊員：${displayName}`;

                document.getElementById('login-screen').classList.add('hidden');

            } finally {
                document.getElementById('loader').classList.add('hidden');
            }

        async function handleBind() {

            const pw = document.getElementById('bind-password').value;

        async function handleRealSignUp() {
            const email = document.getElementById('reg-email').value.trim();
            const pw = document.getElementById('reg-password').value;
            const pwConfirm = document.getElementById('reg-confirm').value;
            const name = document.getElementById('reg-name').value.trim();

            let unit = document.getElementById('reg-unit').value;
            if (unit === '其他' || unit === 'OTHER') {
                unit = document.getElementById('reg-unit-other').value.trim();
                if (!unit) return alert("請手動輸入您的單位名稱！");
            }

            const title = document.getElementById('reg-title').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const note = document.getElementById('reg-note').value.trim();
            const btn = document.getElementById('signup-btn');

            if (!email || !name || !pw) return alert("請填寫必填欄位 (信箱、姓名、密碼)");
            if (pw !== pwConfirm) return alert("兩次密碼輸入不一致");
            if (pw.length < 6) return alert("密碼長度至少需要 6 碼");

            btn.innerText = "提交中..."; btn.disabled = true;

            try {
                // 1. 檢查是否重複 (使用你原本的邏輯)
                const { data: userName } = await _supabase.rpc('get_user_name_by_email', { p_email: email });
                if (userName) {
                    alert(`⚠️ ${userName} 您好，這個信箱已經在系統中了！\n請直接切換至中間的「信箱綁定」來設定 App 密碼，不需重新註冊。`);
                    btn.innerText = "提交新註冊"; btn.disabled = false;
                    return;
                }

                // 2. 建立 Supabase 登入帳號
                const { error: authErr } = await _supabase.auth.signUp({ email, password: pw });
                if (authErr) throw authErr;

                // 🔥 3. 改用 RPC 寫入 users 資料表 (解決權限問題，並保留你所有欄位)
                const fakeUserId = "APP_" + Math.random().toString(36).substr(2, 9);
                const { data: regRes, error: regErr } = await _supabase.rpc('handle_new_user_registration', {
                    p_name: name,
                    p_unit: unit,
                    p_email: email,
                    p_user_id: fakeUserId,
                    p_phone: phone,
                    p_title: title,
                    p_note: note
                });

                if (regErr) throw regErr;
                if (!regRes.success) throw new Error(regRes.message);

                alert("🎉 註冊成功！資料已提交。\n系統將自動為您登入。");

                document.getElementById('login-email').value = email;
                document.getElementById('login-password').value = pw;
                handleLogin();

            } catch (err) {
                alert("錯誤：" + err.message);
            } finally {
                btn.innerText = "提交新註冊"; btn.disabled = false;
            }
        }

        // 🔥 [修改] 切換保管人過濾，並自動幫他「多選」對應的分類與細項
        function switchCustodian(c) {
            currentCustodian = c;

            // 先清空目前的分類與細項選擇
            activeCats.clear();
            activeSubCats.clear();

            if (c !== 'All') {
                // 找出這個人保管的所有裝備
                const myEqs = equipmentCache.filter(e => e.custodian === c);
                // 把對應的大分類與細項塞進「已選集合」中
                myEqs.forEach(eq => {
                    if (eq.category) activeCats.add(eq.category);
                    // 🔥 關鍵：把空字串(沒有細項)也視為一種狀態加入集合
                    const sub = (eq.sub_category || '').trim();
                    activeSubCats.add(sub);
                });
            }

            renderDatalists();
            renderEquipmentList();
        }

        function renderDatalists() {
            const cats = new Set(equipmentCache.map(e => e.category));
            const subcats = new Set(equipmentCache.map(e => e.sub_category || ''));
            const locs = new Set(equipmentCache.map(e => e.location));
            const custodians = new Set(equipmentCache.map(e => e.custodian).filter(Boolean)); // 🔥 抓取有值的保管人

            const notes = new Set(['雪訓', '繩索訓練', '動員訓練', '山域搜救']);
            equipmentCache.forEach(e => e.active_loans?.forEach(l => { if (l.note) notes.add(l.note) }));

            // 處理暫存區資料
            pendingBatchItems.forEach(i => {
                if (i.category) cats.add(i.category);
                if (i.subCategory) subcats.add(i.subCategory);
                if (i.location) locs.add(i.location);
            });

            // ❌ [移除] 這裡原本有一段「渲染上方分類按鈕」的舊程式碼，把它刪掉了！
            // ❌ 不要再手寫 innerHTML = html 了

            renderCategoryUI();

            document.getElementById('location-options').innerHTML = [...locs].sort().map(l => `<option value="${l}">`).join('');
            document.getElementById('note-suggestions').innerHTML = [...notes].sort().map(n => `<option value="${n}">`).join('');

        function renderSubCategoryUI() {

            const subcats = new Set();

        // 🔥 [修改] 列表渲染 (支援圖片模式與列表模式)
        function renderEquipmentList() {
            const listDiv = document.getElementById('equipment-list');
            const searchText = document.getElementById('eq-search').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            
            // ... [這裡保留你原本的 filtered 過濾與 sort 排序邏輯，完全不用動] ...
            let filtered = equipmentCache.filter(eq => {
                const matchCat = activeCats.size === 0 || activeCats.has(eq.category);
                const matchCustodian = currentCustodian === 'All' || eq.custodian === currentCustodian;
                const eqSub = (eq.sub_category || '').trim();
                const matchSubCat = activeSubCats.size === 0 || activeSubCats.has(eqSub);
                const matchLoc = activeLocs.size === 0 || activeLocs.has(eq.location);
                
                let matchNote = true;
                if (activeNotes.size > 0) {
                    if (!eq.active_loans || eq.active_loans.length === 0) {
                        matchNote = false;
                    } else {
                        matchNote = eq.active_loans.some(l => {
                            const noteStr = l.note ? l.note.trim() : '未分類';
                            const mappedNote = noteStr.startsWith('[維修]') ? '維修中' : noteStr;
                            return activeNotes.has(mappedNote);
                        });
                    }
                }

                let matchSearch = !searchText || 
                                eq.name.toLowerCase().includes(searchText) || 
                                (eq.model && eq.model.toLowerCase().includes(searchText));
                
                if (!matchSearch && eq.active_loans && eq.active_loans.length > 0) {
                    matchSearch = eq.active_loans.some(l => 
                        (l.borrower && l.borrower.toLowerCase().includes(searchText)) ||
                        (l.note && l.note.toLowerCase().includes(searchText)) ||
                        (l.note2 && l.note2.toLowerCase().includes(searchText))
                    );
                }

                let matchStatus = true;
                if (statusFilter === 'Borrowed') matchStatus = eq.available_qty < eq.total_qty;
                else if (statusFilter === 'InStock') matchStatus = eq.available_qty === eq.total_qty;
                else if (statusFilter === 'Repair') matchStatus = eq.active_loans && eq.active_loans.some(l => l.note && l.note.startsWith('[維修]'));
                
                return matchCat && matchSubCat && matchLoc && matchSearch && matchStatus && matchNote && matchCustodian;
            });

            filtered.sort((a, b) => {
                const aRepair = a.active_loans?.some(l => l.note?.startsWith('[維修]')) ? 1 : 0;
                const bRepair = b.active_loans?.some(l => l.note?.startsWith('[維修]')) ? 1 : 0;
                if (bRepair !== aRepair) return bRepair - aRepair; 
                return (a.available_qty < a.total_qty ? -1 : 1);

        // 🔥 3. 位置渲染 (智慧連動：只顯示選中細項有的位置)
        function renderLocationUI() {
            const container = document.getElementById('location-filter-container');
            const locs = new Set();

            let sourceData = activeCats.size === 0 ? equipmentCache : equipmentCache.filter(e => activeCats.has(e.category));
            if (activeSubCats.size > 0) sourceData = sourceData.filter(e => activeSubCats.has(e.sub_category || '')); // 瀑布流連動

            sourceData.forEach(e => { if (e.location) locs.add(e.location); });
            if (locs.size === 0) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');

            let html = `<button onclick="switchLocation('All')" class="btn-chip ${activeLocs.size === 0 ? 'active' : ''}">全部位置</button>`;
            Array.from(locs).sort().forEach(loc => {
                html += `<button onclick="switchLocation('${loc}')" class="btn-chip ${activeLocs.has(loc) ? 'active' : ''}">${loc}</button>`;
            });
            container.innerHTML = html;
        }

        // 🔥 4. 用途渲染 (終極智慧連動：只顯示目前過濾下的用途)
        function renderNoteUI() {
            const container = document.getElementById('note-filter-container');
            const notes = new Set();

            let sourceData = activeCats.size === 0 ? equipmentCache : equipmentCache.filter(e => activeCats.has(e.category));
            if (activeSubCats.size > 0) sourceData = sourceData.filter(e => activeSubCats.has(e.sub_category || '')); // 瀑布流連動
            if (activeLocs.size > 0) sourceData = sourceData.filter(e => activeLocs.has(e.location)); // 瀑布流連動

            sourceData.forEach(e => {
                if (e.active_loans) {
                    e.active_loans.forEach(l => {
                        const note = l.note ? l.note.trim() : '未分類';
                        if (note.startsWith('[維修]')) notes.add('維修中');
                        else notes.add(note);
                    });
                }
            });

            // 清理：如果已經不存在該用途，自動從選中名單中移除
            for (let n of activeNotes) { if (!notes.has(n)) activeNotes.delete(n); }

            if (notes.size === 0) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');

            let html = `<button onclick="switchNote('All')" class="btn-chip ${activeNotes.size === 0 ? 'active' : ''}">全部用途</button>`;
            const sortedNotes = Array.from(notes).sort((a, b) => {
                if (a === '維修中') return -1; if (b === '維修中') return 1; return a.localeCompare(b);
            });
            sortedNotes.forEach(n => {
                html += `<button onclick="switchNote('${n}')" class="btn-chip ${activeNotes.has(n) ? 'active' : ''}">${n}</button>`;
            });
            container.innerHTML = html;
        }

        function switchCategory(c) {

                activeCats.clear(); // 點「全部顯示」就清空所有大分類條件
            } else {
                // 點擊切換：有就刪掉，沒有就加進去

            renderDatalists();
            renderEquipmentList();

        // 🔥 切換細項 (多選)
        function switchSubCategory(sc) {

        }

        // 🔥 [新增] 歷史卡片渲染器 (共用邏輯)
        function renderHistoryCard(l) {
            // 判斷是否為維修單
            const isRepair = l.note && l.note.startsWith('[維修]');
            const repairReason = isRepair ? l.note.replace('[維修]', '').trim() : '';

            // 決定顯示的狀態文字與顏色
            let statusText = l.status;
            let statusClass = 'border-blue-500'; // 預設借出是藍色
            let icon = '👤';

            if (isRepair) {
                // 維修邏輯
                if (l.status === '借出中') {
                    statusText = '🔧 維修中';
                    statusClass = 'border-orange-500'; // 維修是橘色
                    icon = '';
                } else {
                    statusText = '✅ 維修完成'; // 歸還變成維修完成
                    statusClass = 'border-green-500';
                    icon = '';
                }
            } else {
                // 一般借還邏輯
                if (l.status === '已歸還') {
                    statusClass = 'border-green-500';
                    icon = '♻️';
                }
            }

            // 顯示裝備名稱 (如果是單項查詢，可能會想隱藏名稱，但統一顯示也無妨)
            const nameHtml = l.item_name ? `<div class="font-bold text-base mb-1">${l.item_name}</div>` : '';
            // 如果是維修，顯示原因；一般借出顯示備註
            const subInfo = isRepair
                ? `<div class="text-xs text-orange-300 mt-1">原因: ${repairReason}</div>`
                : (l.note ? `<div class="text-xs text-gray-400 mt-1">備註: ${l.note}</div>` : '');

            return `
                <div class="bg-gray-700 p-3 mb-2 rounded border-l-4 ${statusClass} text-sm">
                    ${nameHtml}
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-gray-200">${icon} ${l.borrower}</span>
                        <span class="text-xs text-gray-400">${l.time}</span>
                    </div>
                    <div class="flex justify-between items-center mt-1">
                        <span class="font-bold ${isRepair && l.status === '借出中' ? 'text-orange-400' : 'text-gray-300'}">${statusText}</span>
                        <span class="bg-gray-800 px-2 py-0.5 rounded text-xs">數量: ${l.qty}</span>
                    </div>
                    ${subInfo}
                </div>`;
        }

            document.getElementById('details-view-icon').classList.remove('text-green-400');
            // 👆 👆 👆 ------------------------------------- 👆 👆 👆

            // 2. 處理圖片切割與載入 (你原本的邏輯，不變)
            currentImageArray = eq.image ? eq.image.split('\n').map(s => s.trim()).filter(Boolean) : [];
            currentImageIndex = 0; 
            const errorEl = document.getElementById('details-img-error');
            const counterEl = document.getElementById('details-img-counter');

            if (currentImageArray.length > 0) {
                errorEl.classList.add('hidden');
                if (currentImageArray.length > 1) counterEl.classList.remove('hidden');
                else counterEl.classList.add('hidden');
                loadDetailsImage(currentImageIndex);
            } else {
                document.getElementById('details-img-loading').classList.add('hidden');
                document.getElementById('details-image').classList.add('hidden');
                counterEl.classList.add('hidden');
                errorEl.textContent = "尚無圖片資訊";
                errorEl.classList.remove('hidden');
            }

            // 3. 顯示彈窗
            const modal = document.getElementById('details-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setupImageSwipe();
        }

        // 🔥 [升級] 載入特定索引的圖片 (支援懶人式全域快取)
        function loadDetailsImage(index) {
            const imgEl = document.getElementById('details-image');
            const loadingEl = document.getElementById('details-img-loading');
            const counterEl = document.getElementById('details-img-counter');

            const driveId = currentImageArray[index];
            const targetSrc = `https://drive.google.com/thumbnail?id=${driveId}&sz=s0`;

            // 更新半透明計數器文字 (例如: 1 / 3)
            counterEl.textContent = `${index + 1} / ${currentImageArray.length}`;

            // 🧠 核心：檢查小本本裡面有沒有這個 ID？
            if (loadedImageCache.has(driveId)) {
                // ✅ 看過了！直接把圖片網址塞進去，瞬間顯示，完全不轉圈圈！
                imgEl.src = targetSrc;
                hideImgLoading();
            } else {
                // ❌ 沒看過！乖乖顯示轉圈圈，等他下載
                imgEl.classList.add('hidden');
                loadingEl.classList.remove('hidden');
                imgEl.removeAttribute('src'); // 拔掉舊圖避免殘影

                imgEl.onload = () => {
                    // 下載成功啦！把這張圖的 ID 寫進小本本裡
                    loadedImageCache.add(driveId);
                    hideImgLoading();
                };
                imgEl.onerror = showImgError;

                // 觸發請求開始下載
                imgEl.src = targetSrc;
            }
        }

        function toggleDetailsView() {
            isDetailsListView = !isDetailsListView;
            const loanContainer = document.getElementById('details-loan-container');
            const icon = document.getElementById('details-view-icon');

            if (isDetailsListView) {
                // 切換為名單模式：顯示列表，停止旋轉，按鈕變亮綠色
                loanContainer.classList.remove('hidden');
                icon.classList.remove('animate-[spin_4s_linear_infinite]', 'text-blue-400');
                icon.classList.add('text-green-400');
            } else {
                // 切換為圖片模式：隱藏列表，恢復旋轉，按鈕變藍色
                loanContainer.classList.add('hidden');
                icon.classList.add('animate-[spin_4s_linear_infinite]', 'text-blue-400');
                icon.classList.remove('text-green-400');
            }
        }
        // 🔥 [新增] 綁定觸控滑動事件
        let isSwipeBound = false;
        function setupImageSwipe() {
            if (isSwipeBound) return;
            isSwipeBound = true;
            const container = document.getElementById('details-img-container');

            // --- 📱 手機觸控事件 ---
            container.addEventListener('touchstart', e => {
                swipeStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            container.addEventListener('touchend', e => {
                handleSwipe(e.changedTouches[0].screenX);
            }, { passive: true });


            // --- 💻 電腦版滑鼠事件 ---
            let isMouseDown = false;
            container.addEventListener('mousedown', e => {
                isMouseDown = true;
                swipeStartX = e.screenX;
                // 🔥 關鍵：阻止電腦版瀏覽器預設的「圖片拖曳鬼影」行為
                e.preventDefault();
            });

            container.addEventListener('mouseup', e => {
                if (!isMouseDown) return;
                isMouseDown = false;
                handleSwipe(e.screenX);
            });

            // 如果滑鼠按著拖到圖片外面才放開，也要算數
            container.addEventListener('mouseleave', e => {
                if (!isMouseDown) return;
                isMouseDown = false;
                handleSwipe(e.screenX);
            });


            // --- 🔄 共用的滑動判斷邏輯 ---
            function handleSwipe(swipeEndX) {
                if (currentImageArray.length <= 1) return; // 只有一張圖就不用切換

                const diffX = swipeStartX - swipeEndX;

                // 如果往左滑超過 50px (看下一張)
                if (diffX > 50) {
                    currentImageIndex = (currentImageIndex + 1) % currentImageArray.length;
                    loadDetailsImage(currentImageIndex);
                }
                // 如果往右滑超過 50px (看上一張)
                else if (diffX < -50) {
                    currentImageIndex = (currentImageIndex - 1 + currentImageArray.length) % currentImageArray.length;
                    loadDetailsImage(currentImageIndex);
                }
            }
        }

        // 圖片載入成功與失敗的輔助函數
        function hideImgLoading() {
            document.getElementById('details-img-loading').classList.add('hidden');
            document.getElementById('details-image').classList.remove('hidden');
        }
        function showImgError() {
            document.getElementById('details-img-loading').classList.add('hidden');
            document.getElementById('details-img-error').textContent = "圖片載入失敗 (請確認權限)";
            document.getElementById('details-img-error').classList.remove('hidden');
            document.getElementById('details-image').classList.add('hidden');
        }


        // 🔥 將滑鼠拖曳封裝成函數，支援動態生成的 UI
        function attachDragToElements() {
            const sliders = document.querySelectorAll('.filter-row');
            sliders.forEach(slider => {
                if (slider.dataset.dragAttached) return; // 避免重複綁定
                slider.dataset.dragAttached = 'true';

                let isDown = false; let startX; let scrollLeft;
                slider.addEventListener('mousedown', (e) => { isDown = true; slider.classList.add('active'); startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
                slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('active'); });
                slider.addEventListener('mouseup', () => { isDown = false; slider.classList.remove('active'); });
                slider.addEventListener('mousemove', (e) => {
                    if (!isDown) return;
                    e.preventDefault();
                    const walk = (e.pageX - slider.offsetLeft - startX) * 2;
                    slider.scrollLeft = scrollLeft - walk;
                });
            });
        }


        // 🏆 接收來自 Android 的 Token
        window.setFCMToken = function (token) {
            console.log("從手機 App 取得 Token:", token);

            // 如果 userEmail 已經存在 (代表 enterSystem 已跑完)，直接更新
            if (typeof userEmail !== 'undefined' && userEmail) {
                performTokenUpdate(token);
            } else {
                // 否則暫存在全域，等登入流程完成再呼叫
                window.tempFCMToken = token;
            }
        };

        // 執行 Supabase 更新 (遵循 RLS)
        async function performTokenUpdate(token) {
            const { error } = await _supabase
                .from('users')
                .update({ fcm_token: token })
                .eq('電子信箱', userEmail); // 對齊你的 SQL 欄位名稱

            if (error) console.error("同步失敗:", error.message);
            else console.log("🎉 Token 已安全同步");
        }

        // 🚀 註冊 PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('✅ Service Worker 註冊成功:', reg.scope);
                        // 🔥 把註冊實體存進全域變數，給 web_push.js 使用
                        window.swRegistration = reg;
                    })
                    .catch(err => console.error('❌ Service Worker 註冊失敗:', err));
            });
        }

    </script>
